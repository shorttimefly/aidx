<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>B端管理台 - AI智能图片编辑器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="admin-body">
    <main class="admin-shell">
      <header class="admin-header">
        <div>
          <p class="eyebrow">BUSINESS CONSOLE</p>
          <h1>B端管理台</h1>
        </div>
        <div class="admin-header-actions">
          <a class="ghost-button" href="./index.html">返回C端</a>
          <button class="ghost-button danger" id="adminLogoutBtn" type="button">退出</button>
        </div>
      </header>

      <section class="panel admin-login-panel" id="adminLoginPanel">
        <div class="panel-header">
          <h3>管理员登录</h3>
          <span class="muted">默认 admin@example.com / change-me</span>
        </div>
        <div class="admin-login-grid">
          <label class="field">
            <span>管理员邮箱</span>
            <input id="adminEmailInput" type="email" autocomplete="email" value="admin@example.com" />
          </label>
          <label class="field">
            <span>密码</span>
            <input id="adminPasswordInput" type="password" autocomplete="current-password" value="change-me" />
          </label>
          <button class="primary-button" id="adminLoginBtn" type="button">进入管理台</button>
        </div>
      </section>

      <section class="admin-dashboard" id="adminDashboard" hidden>
        <section class="admin-summary-grid" id="adminSummaryGrid"></section>

        <section class="panel admin-config-panel">
          <div class="panel-header">
            <h3>模型默认配置</h3>
            <button class="primary-button" id="saveModelConfigBtn" type="button">保存默认配置</button>
          </div>
          <div class="settings-grid">
            <label class="field">
              <span>默认接口地址</span>
              <input id="defaultEndpointInput" type="url" />
            </label>
            <label class="field">
              <span>默认模型</span>
              <input id="defaultModelInput" type="text" />
            </label>
          </div>
          <label class="field admin-note-field">
            <span>用量说明</span>
            <textarea id="usageNoteInput" rows="3"></textarea>
          </label>
        </section>

        <section class="panel admin-table-panel">
          <div class="panel-header">
            <h3>注册用户</h3>
            <button class="ghost-button" id="refreshUsersBtn" type="button">刷新用户</button>
          </div>
          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>用户</th>
                  <th>来源</th>
                  <th>状态</th>
                  <th>API Key</th>
                  <th>调用</th>
                  <th>图片</th>
                  <th>Token</th>
                  <th>注册/登录</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="adminUserTable"></tbody>
            </table>
          </div>
        </section>

        <section class="panel admin-table-panel">
          <div class="panel-header">
            <h3>图片反馈</h3>
            <div class="admin-filter-row">
              <label class="field compact-field">
                <span>反馈类型</span>
                <select id="feedbackTypeFilter">
                  <option value="">全部反馈</option>
                  <option value="upvote">点赞</option>
                  <option value="downvote">点踩</option>
                </select>
              </label>
              <label class="field compact-field">
                <span>用户来源</span>
                <select id="feedbackSourceFilter">
                  <option value="">全部来源</option>
                </select>
              </label>
              <label class="field compact-field">
                <span>图片来源</span>
                <select id="feedbackImageSourceFilter">
                  <option value="">全部来源</option>
                </select>
              </label>
              <button class="ghost-button" id="refreshFeedbackBtn" type="button">刷新反馈</button>
            </div>
          </div>
          <div class="admin-table-wrap">
            <table class="admin-table feedback-table">
              <thead>
                <tr>
                  <th>图片</th>
                  <th>用户 / 来源</th>
                  <th>生成来源</th>
                  <th>提示词</th>
                  <th>入参</th>
                  <th>时间</th>
                </tr>
              </thead>
              <tbody id="adminFeedbackTable"></tbody>
            </table>
          </div>
        </section>

        <section class="panel admin-table-panel">
          <div class="panel-header">
            <h3>生成记录与出入参数日志</h3>
            <button class="ghost-button" id="refreshLogsBtn" type="button">刷新日志</button>
          </div>
          <div class="admin-table-wrap">
            <table class="admin-table logs-table">
              <thead>
                <tr>
                  <th>时间</th>
                  <th>用户</th>
                  <th>模型</th>
                  <th>状态</th>
                  <th>用量</th>
                  <th>提示词 / 出入参</th>
                </tr>
              </thead>
              <tbody id="adminLogTable"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./admin.js" defer></script>
  </body>
</html>
