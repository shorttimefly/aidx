<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>B端管理台 - AI智能图片编辑器</title>
    <link rel="stylesheet" href="./styles.css?v=20260611-provider-list" />
  </head>
  <body class="admin-body">
    <main class="admin-shell">
      <header class="admin-header">
        <div>
          <p class="eyebrow">BUSINESS CONSOLE</p>
          <h1>B端管理台</h1>
        </div>
        <div class="admin-header-actions">
          <a class="ghost-button" href="./index.html">返回C端</a>
          <button class="ghost-button danger" id="adminLogoutBtn" type="button">退出</button>
        </div>
      </header>

      <section class="admin-dashboard" id="adminDashboard" hidden>
        <aside class="admin-rail" aria-label="管理台导航">
          <button class="admin-nav-item active" type="button" data-admin-view="model">模型配置</button>
          <button class="admin-nav-item" type="button" data-admin-view="feedback">图片反馈</button>
          <button class="admin-nav-item" type="button" data-admin-view="users">注册用户</button>
          <button class="admin-nav-item" type="button" data-admin-view="logs">生成记录</button>
          <button class="admin-nav-item" type="button" data-admin-view="prompts">提示词配置</button>
        </aside>

        <section class="admin-content">
          <section class="admin-view active" data-admin-view-panel="model">
            <section class="admin-summary-grid" id="adminSummaryGrid"></section>

            <section class="panel admin-config-panel">
              <div class="panel-header">
                <h3>模型默认配置</h3>
                <button class="primary-button" id="saveModelConfigBtn" type="button">保存默认配置</button>
              </div>
              <div class="settings-grid">
                <label class="field">
                  <span>默认 Base URL / 接口地址</span>
                  <input id="defaultEndpointInput" type="text" placeholder="https://aokapi.com/v1beta/models/{model}:generateContent/" />
                </label>
                <label class="field">
                  <span>默认模型</span>
                  <input id="defaultModelInput" type="text" />
                </label>
              </div>
              <label class="field admin-note-field">
                <span>用量说明</span>
                <textarea id="usageNoteInput" rows="3"></textarea>
              </label>
            </section>

            <section class="panel admin-provider-panel">
              <div class="panel-header">
                <h3>模型供应商</h3>
                <div class="admin-provider-actions">
                  <button class="primary-button" id="addModelProviderBtn" type="button">增加</button>
                </div>
              </div>
              <div class="admin-provider-list" id="modelProviderList"></div>
            </section>
          </section>

          <section class="admin-view" data-admin-view-panel="feedback">
            <section class="panel admin-table-panel">
              <div class="panel-header">
                <h3>图片反馈</h3>
                <div class="admin-filter-row">
                  <label class="field compact-field">
                    <span>反馈类型</span>
                    <select id="feedbackTypeFilter">
                      <option value="">全部反馈</option>
                      <option value="upvote">点赞</option>
                      <option value="downvote">点踩</option>
                    </select>
                  </label>
                  <label class="field compact-field">
                    <span>用户来源</span>
                    <select id="feedbackSourceFilter">
                      <option value="">全部来源</option>
                    </select>
                  </label>
                  <label class="field compact-field">
                    <span>图片来源</span>
                    <select id="feedbackImageSourceFilter">
                      <option value="">全部来源</option>
                    </select>
                  </label>
                  <button class="ghost-button" id="refreshFeedbackBtn" type="button">刷新反馈</button>
                </div>
              </div>
              <div class="admin-table-wrap">
                <table class="admin-table feedback-table">
                  <thead>
                    <tr>
                      <th>图片</th>
                      <th>用户 / 来源</th>
                      <th>生成来源</th>
                      <th>提示词</th>
                      <th>入参</th>
                      <th>时间</th>
                    </tr>
                  </thead>
                  <tbody id="adminFeedbackTable"></tbody>
                </table>
              </div>
            </section>
          </section>

          <section class="admin-view" data-admin-view-panel="users">
            <section class="panel admin-table-panel">
              <div class="panel-header">
                <h3>注册用户</h3>
                <button class="ghost-button" id="refreshUsersBtn" type="button">刷新用户</button>
              </div>
              <div class="admin-table-wrap">
                <table class="admin-table">
                  <thead>
                    <tr>
                      <th>用户</th>
                      <th>来源</th>
                      <th>状态</th>
                      <th>角色</th>
                      <th>图片 Key</th>
                      <th>视频 Key</th>
                      <th>调用</th>
                      <th>图片</th>
                      <th>Token</th>
                      <th>注册/登录</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody id="adminUserTable"></tbody>
                </table>
              </div>
            </section>
          </section>

          <section class="admin-view" data-admin-view-panel="logs">
            <section class="panel admin-table-panel">
              <div class="panel-header">
                <h3>生成记录与出入参数日志</h3>
                <button class="ghost-button" id="refreshLogsBtn" type="button">刷新日志</button>
              </div>
              <div class="admin-table-wrap">
                <table class="admin-table logs-table">
                  <thead>
                    <tr>
                      <th>时间</th>
                      <th>用户</th>
                      <th>模型</th>
                      <th>状态</th>
                      <th>用量</th>
                      <th>提示词 / 出入参</th>
                    </tr>
                  </thead>
                  <tbody id="adminLogTable"></tbody>
                </table>
              </div>
            </section>
          </section>

          <section class="admin-view" data-admin-view-panel="prompts">
            <section class="panel admin-prompt-panel">
              <div class="panel-header">
                <h3>提示词配置</h3>
                <button class="primary-button" id="savePromptConfigBtn" type="button">保存提示词配置</button>
              </div>
              <div class="admin-prompt-layout">
                <aside class="admin-prompt-nav" id="promptGroupList" aria-label="提示词分类"></aside>
                <div class="admin-prompt-editor" id="promptConfigEditor"></div>
              </div>
            </section>
          </section>
        </section>
      </section>
    </main>

    <div class="modal-backdrop" id="providerConfigModal" aria-hidden="true">
      <div class="modal provider-config-modal" role="dialog" aria-modal="true" aria-labelledby="providerConfigModalTitle">
        <div class="modal-header">
          <div>
            <p class="eyebrow">MODEL PROVIDER</p>
            <h3 id="providerConfigModalTitle">增加供应商</h3>
          </div>
          <button class="icon-button" type="button" id="closeProviderConfigModalBtn" aria-label="关闭" title="关闭">
            <svg viewBox="0 0 24 24"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="provider-modal-grid">
            <label class="field">
              <span>供应商名称</span>
              <input id="providerNameInput" type="text" autocomplete="off" placeholder="例如：Muskapis" />
            </label>
            <label class="field">
              <span>供应商类型</span>
              <select id="providerTypeInput">
                <option value="muskapis_image">Muskapis Image</option>
                <option value="openai_image">OpenAI Image Compatible</option>
                <option value="aokapi_gemini">AOKAPI / Gemini</option>
              </select>
            </label>
          </div>
          <label class="field">
            <span>URL</span>
            <input id="providerBaseUrlInput" type="url" autocomplete="off" placeholder="https://api.muskapis.com/v1" />
          </label>
          <label class="field">
            <span>Token</span>
            <input id="providerTokenInput" type="text" autocomplete="off" placeholder="粘贴供应商 Token" />
          </label>
          <div class="provider-modal-grid">
            <label class="field">
              <span>模型名</span>
              <input id="providerModelNameInput" type="text" autocomplete="off" placeholder="gpt-image-2" />
            </label>
            <label class="field">
              <span>优先级</span>
              <input id="providerModelPriorityInput" type="number" min="1" step="1" value="100" />
            </label>
          </div>
          <label class="checkbox-row provider-enabled-row">
            <input id="providerEnabledInput" type="checkbox" checked />
            <span>启用供应商</span>
          </label>
        </div>
        <div class="modal-actions">
          <button class="ghost-button" type="button" id="cancelProviderConfigBtn">取消</button>
          <button class="primary-button" type="button" id="saveProviderConfigBtn">保存</button>
        </div>
      </div>
    </div>

    <div class="modal-backdrop" id="adminKeyModal" aria-hidden="true">
      <div class="modal auth-modal" role="dialog" aria-modal="true" aria-labelledby="adminKeyModalTitle">
        <div class="modal-header">
          <div>
            <p class="eyebrow">USER MODEL CONFIG</p>
            <h3 id="adminKeyModalTitle">配置用户模型 Key</h3>
          </div>
          <button class="icon-button" type="button" id="closeAdminKeyModalBtn" aria-label="关闭" title="关闭">
            <svg viewBox="0 0 24 24"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="auth-note">
            <strong id="adminKeyUserText">选择用户后配置</strong>
            <span id="adminKeyHelpText">保存后 C 端只会看到脱敏状态，生成请求由后端使用该配置调用模型。</span>
          </div>
          <label class="field">
            <span id="adminKeyInputLabel">新的 Key</span>
            <input id="adminApiKeyInput" type="password" autocomplete="off" placeholder="粘贴新的 API Key" />
          </label>
          <label class="field" id="adminImageEndpointField">
            <span>图片 Base URL / 地址</span>
            <input id="adminImageEndpointInput" type="text" autocomplete="off" placeholder="https://aokapi.com/v1beta/models/{model}:generateContent/" />
          </label>
          <label class="field" id="adminImageModelField">
            <span>图片模型</span>
            <input id="adminImageModelInput" type="text" autocomplete="off" placeholder="gemini-2.5-flash-image" />
          </label>
          <section class="admin-allowed-model-section" id="adminAllowedImageModelSection">
            <div class="field">
              <span>可用图片模型</span>
              <div class="admin-allowed-model-list" id="adminAllowedImageModelList"></div>
            </div>
          </section>
          <label class="field" id="adminVideoModelField">
            <span>视频模型</span>
            <input id="adminVideoModelInput" type="text" autocomplete="off" placeholder="例如：veo-3-fast" />
          </label>
          <label class="field" id="adminVideoEndpointPrimaryField">
            <span>视频地址 1</span>
            <input id="adminVideoEndpointPrimaryInput" type="url" autocomplete="off" placeholder="视频接口地址 1" />
          </label>
          <label class="field" id="adminVideoEndpointSecondaryField">
            <span>视频地址 2</span>
            <input id="adminVideoEndpointSecondaryInput" type="url" autocomplete="off" placeholder="视频接口地址 2" />
          </label>
        </div>
        <div class="modal-actions">
          <button class="ghost-button danger" type="button" id="clearUserKeyBtn">清空 Key</button>
          <button class="ghost-button" type="button" id="cancelUserKeyBtn">取消</button>
          <button class="primary-button" type="button" id="saveUserKeyBtn">保存配置</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./admin.js?v=20260611-provider-list" defer></script>
  </body>
</html>
