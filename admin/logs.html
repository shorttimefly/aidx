<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>生成记录 - AI Image Studio B端</title>
  <link rel="stylesheet" href="../shared/styles.css?v=5" />
  <style>
    .log-table { width: 100%; border-collapse: collapse; font-size: var(--font-size-sm); }
    .log-table th, .log-table td { padding: var(--space-2) var(--space-3); text-align: left; border-bottom: 1px solid var(--color-border); }
    .log-table th { font-weight: var(--font-weight-semibold); color: var(--color-text-secondary); font-size: var(--font-size-xs); text-transform: uppercase; }
    .log-table td { color: var(--color-text); }
    .log-table tr:hover td { background: var(--color-bg); }
    .prompt-cell { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .load-more { text-align: center; margin-top: var(--space-4); }
  </style>
</head>
<body>
<div class="shell">
  <aside class="shell-sidebar">
    <div class="sidebar-brand">AI Image Studio B端</div>
    <nav class="sidebar-nav">
          <a href="./index.html" >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> 首页
          </a>
          <a href="./users.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> 用户管理
          </a>
          <a href="./models.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg> 模型配置
          </a>
          <a href="./prompts.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/><line x1="12" y1="22" x2="12" y2="15.5"/><polyline points="22 8.5 12 15.5 2 8.5"/></svg> 提示词配置
          </a>
          <a href="./factory.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2"/></svg> 提示词工厂
          </a>
          <a href="./redeem.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg> 兑换码
          </a>
          <a href="./logs.html" class="active">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> 生成记录
          </a>
        </nav>
    <div class="sidebar-footer" id="sidebarUser"></div>
  </aside>

  <div class="shell-main">
    <header class="shell-topbar">
      <span class="font-medium">生成记录</span>
      <div class="flex items-center gap-4">
        <a href="../index.html" class="btn btn-ghost btn-sm">C端</a>
        <span class="text-sm text-secondary" id="topbarUser"></span>
        <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">退出</button>
      </div>
    </header>

    <main class="shell-content">
      <div class="card">
        <div class="flex items-center justify-between" style="margin-bottom:var(--space-4)">
          <h3>最近生成记录</h3>
          <button class="btn btn-ghost btn-sm" onclick="loadLogs()">刷新</button>
        </div>
        <div style="overflow-x:auto">
          <table class="log-table">
            <thead><tr><th>时间</th><th>用户</th><th>模型</th><th>提示词</th><th>数量</th><th>状态</th><th>耗时</th></tr></thead>
            <tbody id="logBody"><tr><td colspan="8" class="text-muted" style="text-align:center;padding:var(--space-8)">加载中...</td></tr></tbody>
          </table>
        </div>
        <div class="load-more" id="loadMore"></div>
      </div>
      <div id="toast" class="toast"></div>
    </main>
  </div>
</div>

<script src="../shared/auth.js"></script>
<script src="../shared/api.js?v=2"></script>
<script>
let offset = 0, limit = 50;

async function init() {
  try { await Auth.init("admin"); } catch { return; }
  document.getElementById("topbarUser").textContent = Auth.user?.email || "";
  document.getElementById("sidebarUser").textContent = Auth.user?.email || "";
  await loadLogs();
}

async function loadLogs() {
  try {
    const data = await Api.admin(`/logs?limit=${limit}`);
    const logs = data.logs || [];
    if (!logs.length && offset === 0) {
      document.getElementById("logBody").innerHTML = '<tr><td colspan="8" class="text-muted" style="text-align:center;padding:var(--space-8)">暂无生成记录</td></tr>';
      return;
    }
    document.getElementById("logBody").innerHTML = logs.map(l => `
      <tr>
        <td>${fmtTime(l.createdAt)}</td>
        <td class="text-sm">${esc(l.userName || l.userId || "-")}</td>
        <td>${esc(l.model || "-")}</td>
        <td class="prompt-cell" title="${escAttr(l.prompt || "")}">${esc((l.prompt || "").slice(0, 80))}</td>
        <td>${l.count || 0}</td>
        <td><span class="badge ${l.status === 'completed' ? 'badge-success' : 'badge-error'}">${l.status === 'completed' ? '成功' : '失败'}</span></td>
        <td>${l.durationMs ? (l.durationMs / 1000).toFixed(1) + 's' : '-'}</td>
        <td><button class="btn btn-ghost btn-sm" onclick="showDetail('${l.id}')">详情</button></td>
      </tr>
    `).join("") || '<tr><td colspan="8" class="text-muted" style="text-align:center">暂无更多</td></tr>';
    document.getElementById("loadMore").innerHTML = logs.length === limit
      ? `<button class="btn btn-secondary btn-sm" onclick="offset+=limit;loadLogs()">加载更多</button>`
      : "";
  } catch(e) {
    document.getElementById("logBody").innerHTML = `<tr><td colspan="8" class="text-muted" style="text-align:center">加载失败: ${esc(e.message)}</td></tr>`;
  }
}

function fmtTime(iso) {
  if (!iso) return "-";
  const d = new Date(iso);
  return d.toLocaleString("zh-CN", { month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit" });
}
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escAttr(s) { return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

async function showDetail(logId) {
  document.getElementById("detailModal").style.display = "flex";
  document.getElementById("detailContent").innerHTML = '<div class="text-muted text-sm" style="text-align:center;padding:var(--space-8)"><div class="spinner"></div><br/>加载中...</div>';
  try {
    var data = await Api.admin("/admin/logs/" + logId);
    var log = data.log || {};
    var assets = data.assets || [];
    var req = log.requestBody || {};
    var body = req.body || {};
    var refs = body.referenceImages || [];
    var html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4)">';
    html += '<div><h4 class="text-sm font-medium">模型 / 状态</h4><p class="text-sm">' + esc(log.model||"-") + ' · ' + esc(log.size||"") + ' · <span class="badge ' + (log.status==='completed'?'badge-success':'badge-error') + '">' + (log.status==='completed'?'成功':'失败') + '</span></p></div>';
    html += '<div><h4 class="text-sm font-medium">模板</h4><p class="text-sm">' + esc(body.templateId || "手动输入") + '</p></div>';
    if (refs.length) html += '<div><h4 class="text-sm font-medium">参考图 (' + refs.length + ')</h4><div style="display:flex;gap:4px;flex-wrap:wrap">' + refs.map(function(r){ return '<img src="' + escAttr(r.url||r.dataUrl||'') + '" style="width:80px;height:80px;object-fit:cover;border-radius:4px;border:1px solid var(--color-border)" />'; }).join("") + '</div></div>';
    html += '<div><h4 class="text-sm font-medium">提示词</h4><div style="max-height:120px;overflow-y:auto;font-size:var(--font-size-xs);line-height:1.6;white-space:pre-wrap;background:var(--color-bg);padding:var(--space-2);border-radius:var(--radius-md)">' + esc(log.prompt||"-") + '</div></div>';
    if (assets.length) html += '<div><h4 class="text-sm font-medium">生成结果 (' + assets.length + ')</h4><div style="display:flex;gap:4px;flex-wrap:wrap">' + assets.map(function(a){ return '<img src="' + escAttr(a.url) + '" style="width:120px;height:120px;object-fit:cover;border-radius:4px;border:1px solid var(--color-border)" title="' + escAttr(a.name||'') + '" />'; }).join("") + '</div></div>';
    if (log.error) html += '<div style="grid-column:1/-1"><h4 class="text-sm font-medium">错误信息</h4><p class="text-sm" style="color:var(--color-error)">' + esc(log.error) + '</p></div>';
    html += '</div>';
    document.getElementById("detailContent").innerHTML = html;
  } catch(e) {
    document.getElementById("detailContent").innerHTML = '<div class="text-muted text-sm" style="text-align:center;padding:var(--space-8)">加载失败: ' + esc(e.message) + '</div>';
  }
}
function closeModal() { document.getElementById("detailModal").style.display = "none"; }

init();
</script>  <!-- Detail Modal -->
  <div id="detailModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center">
    <div class="card" style="width:90%;max-width:700px;max-height:85vh;overflow-y:auto">
      <div class="flex items-center justify-between" style="margin-bottom:var(--space-4)">
        <h3>生成详情</h3>
        <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
      </div>
      <div id="detailContent"><div class="text-muted text-sm" style="text-align:center;padding:var(--space-8)">加载中...</div></div>
    </div>
  </div>
</body>
</html>
