<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>提示词配置 — AI 智能图片编辑器 · 后台管理</title>
  <link rel="stylesheet" href="../shared/styles.css?v=4" />
  <style>
    /* ── Tree ── */
    .tree { margin: 0; }
    .tree-node { border: 1px solid var(--color-border); border-radius: var(--radius-md); margin-bottom: var(--space-2); overflow: hidden; }
    .tree-node-header {
      padding: var(--space-2) var(--space-3); display: flex; align-items: center; gap: var(--space-2);
      cursor: pointer; user-select: none; transition: background var(--transition-fast);
    }
    .tree-node-header:hover { background: var(--color-bg); }
    .tree-node-header .arrow { font-size: 10px; transition: transform var(--transition-fast); width: 14px; text-align: center; flex-shrink: 0; }
    .tree-node.open > .tree-node-header .arrow { transform: rotate(90deg); }
    .tree-node-body { display: none; padding: var(--space-2) var(--space-3) var(--space-3); border-top: 1px solid var(--color-border); background: var(--color-bg); }
    .tree-node.open > .tree-node-body { display: block; }

    /* ── Scenario card ── */
    .scenario-card {
      background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md);
      margin-bottom: var(--space-3); padding: var(--space-3);
    }
    .scenario-card .scenario-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-2);
    }

    /* ── Level indentation ── */
    .level-platform { }
    .level-category { margin-left: var(--space-6); }
    .level-scenario { margin-left: var(--space-4); }

    /* ── Textarea ── */
    textarea.prompt-textarea {
      width: 100%; min-height: 80px; font-size: var(--font-size-xs); resize: vertical;
      font-family: var(--font-family);
    }

    /* ── Misc ── */
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--color-border); border-top-color: var(--color-accent); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: var(--space-2); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: var(--space-6); color: var(--color-text-muted); }
    .save-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-4); }
  </style>
</head>
<body>
  <div class="shell">
    <!-- Sidebar -->
    <aside class="shell-sidebar">
      <div class="sidebar-brand">AI Image Studio</div>
      <nav class="sidebar-nav">
        <a href="../admin/index.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> 首页</a>
        <a href="users.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> 用户管理</a>
        <a href="models.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> 模型配置</a>
        <a href="prompts.html" class="active">提示词配置</a>
        <a href="./factory.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4zM3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg> 提示词工厂</a>
        <a href="redeem.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg> 兑换码</a>
        <a href="logs.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> 生成记录</a>
      </nav>
      <div class="sidebar-footer">
        <span>B端管理台</span>
      </div>
    </aside>

    <!-- Main -->
    <div class="shell-main">
      <header class="shell-topbar">
        <h2 style="font-size:var(--font-size-lg);">提示词配置</h2>
        <div class="flex items-center gap-4">
          <a href="../index.html" class="btn btn-ghost btn-sm">C端</a>
        <span id="topbarUser" class="text-sm text-secondary"></span>
          <button class="btn btn-ghost btn-sm" id="logoutBtn" type="button">退出</button>
        </div>
      </header>

      <section class="shell-content">
        <div class="card">
          <div class="save-bar">
            <h3 style="margin:0;">提示词矩阵</h3>
            <div class="flex items-center gap-3">
              <button class="btn btn-ghost btn-sm" id="expandAllBtn" type="button">展开全部</button>
              <button class="btn btn-ghost btn-sm" id="collapseAllBtn" type="button">收起全部</button>
              <button class="btn btn-primary" id="saveBtn" type="button">保存配置</button>
            </div>
          </div>
          <div id="treeContainer">
            <div class="empty-state"><span class="spinner"></span>加载中…</div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="../shared/auth.js"></script>
  <script src="../shared/api.js?v=2"></script>

  <script>
    "use strict";

    /* ── Elements ── */
    var topbarUser = document.getElementById("topbarUser");
    var logoutBtn = document.getElementById("logoutBtn");
    var toastEl = document.getElementById("toast");
    var treeContainer = document.getElementById("treeContainer");
    var saveBtn = document.getElementById("saveBtn");
    var expandAllBtn = document.getElementById("expandAllBtn");
    var collapseAllBtn = document.getElementById("collapseAllBtn");

    /* State */
    var promptConfig = null;

    /* ── Toast ── */
    function toast(msg, isError) {
      toastEl.textContent = msg;
      toastEl.classList.toggle("error", !!isError);
      if (!isError) toastEl.style.background = "#22C55E";
      else toastEl.style.background = "";
      toastEl.classList.add("active");
      clearTimeout(toastEl._t);
      toastEl._t = setTimeout(function () { toastEl.classList.remove("active"); toastEl.style.background = ""; }, 5000);
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
    var escapeAttr = escapeHtml;

    /* ── Load config ── */
    async function loadConfig() {
      treeContainer.innerHTML = '<div class="empty-state"><span class="spinner"></span>加载中…</div>';
      try {
        var data = await Api.admin("/admin/prompt-config");
        promptConfig = data.promptConfig || {};
        renderTree(promptConfig);
      } catch (e) {
        if (!e.authFailure) {
          treeContainer.innerHTML = '<div class="empty-state">加载失败: ' + escapeHtml(e.message) + '</div>';
          toast(e.message, true);
        }
      }
    }

    function renderTree(config) {
      var matrix = config.single && config.single.matrix ? config.single.matrix : {};
      var platforms = matrix.platforms || [];

      if (!platforms.length) {
        treeContainer.innerHTML = '<div class="empty-state">暂无提示词配置数据</div>';
        return;
      }

      var html = '<div class="tree">';

      platforms.forEach(function (platform) {
        var categories = platform.categories || [];
        html += '<div class="tree-node level-platform" data-node="platform" data-platform-id="' + platform.id + '">';
        html += '<div class="tree-node-header">';
        html += '<span class="arrow">▶</span>';
        html += '<input class="input label-input" data-label-path="platform.' + platform.id + '" value="' + escapeAttr(platform.label || "") + '" placeholder="平台名称" />';
        html += '<span class="badge badge-neutral">平台</span>';
        html += '<span class="text-sm text-muted">' + categories.length + ' 分类</span>';
        html += '</div>';
        html += '<div class="tree-node-body">';

        categories.forEach(function (category) {
          var scenarios = category.scenarios || [];
          html += '<div class="tree-node level-category" data-node="category" data-platform-id="' + platform.id + '" data-category-id="' + category.id + '">';
          html += '<div class="tree-node-header">';
          html += '<span class="arrow">▶</span>';
          html += '<input class="input label-input" data-label-path="category.' + platform.id + '.' + category.id + '" value="' + escapeAttr(category.label || "") + '" placeholder="分类名称" />';
          html += '<span class="badge badge-neutral">分类</span>';
          html += '<span class="text-sm text-muted">' + scenarios.length + ' 场景</span>';
          html += '</div>';
          html += '<div class="tree-node-body">';

          scenarios.forEach(function (scenario) {
            html += '<div class="scenario-card level-scenario">';
            html += '<div class="scenario-header">';
            html += '<input class="input label-input" data-label-path="scenario.' + platform.id + '.' + category.id + '.' + (scenario.id || "") + '" value="' + escapeAttr(scenario.title || "") + '" placeholder="场景名称" style="margin-bottom:var(--space-2)" />';
            html += '</div>';
            html += '<label class="field">';
            html += '<span class="text-sm text-secondary">提示词 (Prompt)</span>';
            html += '<textarea class="input prompt-textarea" data-prompt-path="'
              + platform.id + '.' + category.id + '.' + (scenario.id || "")
              + '" rows="4">' + escapeHtml(scenario.prompt || "") + '</textarea>';
            html += '</label>';
            html += '</div>';
          });

          html += '</div></div>';
        });

        html += '</div></div>';
      });

      html += '</div>';
      treeContainer.innerHTML = html;
    }

    /* ── Tree toggle ── */
    treeContainer.addEventListener("click", function (e) {
      var header = e.target.closest(".tree-node-header");
      if (!header) return;
      var node = header.closest(".tree-node");
      if (node) node.classList.toggle("open");
    });

    /* ── Expand / Collapse all ── */
    expandAllBtn.addEventListener("click", function () {
      treeContainer.querySelectorAll(".tree-node").forEach(function (n) { n.classList.add("open"); });
    });

    collapseAllBtn.addEventListener("click", function () {
      treeContainer.querySelectorAll(".tree-node").forEach(function (n) { n.classList.remove("open"); });
    });

    /* ── Collect changes ── */
    function collectConfig() {
      var cfg = JSON.parse(JSON.stringify(promptConfig));
      var matrix = cfg.single && cfg.single.matrix;
      if (!matrix) return cfg;

      // collect prompt textareas
      treeContainer.querySelectorAll("textarea[data-prompt-path]").forEach(function (ta) {
        var parts = ta.getAttribute("data-prompt-path").split(".");
        if (parts.length < 3) return;
        var plat = (matrix.platforms || []).find(function (p) { return p.id === parts[0]; });
        if (!plat) return;
        var cat = (plat.categories || []).find(function (c) { return c.id === parts[1]; });
        if (!cat) return;
        var sc = (cat.scenarios || []).find(function (s) { return s.id === parts.slice(2).join("."); });
        if (!sc) return;
        sc.prompt = ta.value;
      });

      // collect label inputs (platform/category/scenario titles)
      treeContainer.querySelectorAll("input[data-label-path]").forEach(function (inp) {
        var parts = inp.getAttribute("data-label-path").split(".");
        var type = parts[0];
        if (type === "platform") {
          var p = (matrix.platforms || []).find(function (x) { return x.id === parts[1]; });
          if (p) p.label = inp.value;
        } else if (type === "category") {
          var pl = (matrix.platforms || []).find(function (x) { return x.id === parts[1]; });
          var ct = pl && (pl.categories || []).find(function (x) { return x.id === parts[2]; });
          if (ct) ct.label = inp.value;
        } else if (type === "scenario") {
          var pl2 = (matrix.platforms || []).find(function (x) { return x.id === parts[1]; });
          var ct2 = pl2 && (pl2.categories || []).find(function (x) { return x.id === parts[2]; });
          var sc2 = ct2 && (ct2.scenarios || []).find(function (x) { return x.id === parts.slice(3).join("."); });
          if (sc2) sc2.title = inp.value;
        }
      });

      return cfg;
    }

    /* ── Save ── */
    saveBtn.addEventListener("click", async function () {
      var updated = collectConfig();
      saveBtn.disabled = true;
      saveBtn.textContent = "保存中…";
      try {
        var result = await Api.admin("/admin/prompt-config", {
          method: "PUT",
          body: { promptConfig: updated }
        });
        /* Update local state with normalized response */
        promptConfig = result.promptConfig || updated;
        toast("提示词配置已保存");
      } catch (e) {
        toast(e.message, true);
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = "保存配置";
      }
    });

    /* ── Logout ── */
    logoutBtn.addEventListener("click", function () {
      Auth.logout();
    });

    /* ── Init ── */
    async function init() {
      try {
        var user = await Auth.init("admin");
        topbarUser.textContent = user.email || "";
        loadConfig();
      } catch (e) {
        /* Auth.init handles redirect */
      }
    }

    init();
  </script>
</body>
</html>
