<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>模型配置 - AI Image Studio B端</title>
  <link rel="stylesheet" href="../shared/styles.css?v=5" />
  <style>
    .provider-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-4); margin-bottom: var(--space-3); }
    .provider-header { display: flex; align-items: center; justify-content: space-between; }
    .provider-meta { font-size: var(--font-size-xs); color: var(--color-text-muted); margin-top: var(--space-1); }
    .model-table { width: 100%; margin-top: var(--space-3); font-size: var(--font-size-xs); }
    .model-table th, .model-table td { padding: var(--space-1) var(--space-2); text-align: left; border-bottom: 1px solid var(--color-border); }
    .model-table th { color: var(--color-text-muted); font-weight: var(--font-weight-medium); }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-start; justify-content: center; padding-top: 5vh; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: var(--color-surface); border-radius: var(--radius-xl); width: 90%; max-width: 720px; max-height: 85vh; overflow-y: auto; padding: var(--space-6); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); }
    .model-edit-row { display: grid; grid-template-columns: 1.5fr 1.2fr 0.8fr 1fr 40px; gap: var(--space-2); align-items: end; margin-bottom: var(--space-2); }
    .model-edit-row .btn { padding: 0.25rem 0.5rem; font-size: var(--font-size-xs); }
  </style>
</head>
<body>
<div class="shell">
  <aside class="shell-sidebar">
    <div class="sidebar-brand">AI Image Studio B端</div>
    <nav class="sidebar-nav">
      <a href="./index.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> 首页</a>
      <a href="./users.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> 用户管理</a>
      <a href="./models.html" class="active"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg> 模型配置</a>
      <a href="./prompts.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/><line x1="12" y1="22" x2="12" y2="15.5"/><polyline points="22 8.5 12 15.5 2 8.5"/></svg> 提示词配置</a>
      <a href="./factory.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2"/></svg> 提示词工厂</a>
      <a href="./redeem.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg> 兑换码</a>
      <a href="./logs.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> 生成记录</a>
    </nav>
    <div class="sidebar-footer" id="sidebarUser"></div>
  </aside>

  <div class="shell-main">
    <header class="shell-topbar">
      <span class="font-medium">模型配置</span>
      <div class="flex items-center gap-4">
        <a href="../index.html" class="btn btn-ghost btn-sm">C端</a>
        <span class="text-sm text-secondary" id="topbarUser"></span>
        <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">退出</button>
      </div>
    </header>

    <main class="shell-content">
      <div class="flex items-center justify-between" style="margin-bottom:var(--space-4)">
        <h3>模型供应商</h3>
        <div class="flex gap-2">
          <button class="btn btn-primary btn-sm" id="addProviderBtn">添加供应商</button>
          <button class="btn btn-ghost btn-sm" id="refreshBtn">刷新</button>
        </div>
      </div>

      <div id="providerList"></div>

      <!-- Edit Modal -->
      <div class="modal-overlay" id="editModal">
        <div class="modal-box">
          <div class="flex items-center justify-between" style="margin-bottom:var(--space-4)">
            <h3 id="modalTitle">编辑供应商</h3>
            <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
          </div>
          <div class="field-row" style="margin-bottom:var(--space-4)">
            <label class="field"><span>供应商名称</span><input class="input" id="provName" /></label>
            <label class="field"><span>Base URL</span><input class="input" id="provUrl" /></label>
            <label class="field" style="grid-column:span 2"><span>Token / API Key</span><input class="input" id="provKey" type="password" /></label>
          </div>
          <div class="field-row" style="margin-bottom:var(--space-4)">
            <label class="field"><span>默认图片模型</span><select class="input" id="defaultImageModel"></select></label>
            <label class="field"><span>默认视频模型</span><select class="input" id="defaultVideoModel"></select></label>
          </div>

          <div class="flex items-center justify-between" style="margin-bottom:var(--space-2)">
            <h4 class="text-sm font-medium">模型列表</h4>
            <button class="btn btn-secondary btn-sm" id="addModelBtn">+ 添加模型</button>
          </div>
          <div id="modelEditList"></div>

          <div class="flex justify-between" style="margin-top:var(--space-4)">
            <span class="text-sm text-muted" id="modalStatus"></span>
            <div class="flex gap-2">
              <button class="btn btn-ghost btn-sm" onclick="closeModal()">取消</button>
              <button class="btn btn-primary btn-sm" id="saveModalBtn">保存</button>
            </div>
          </div>
        </div>
      </div>

      <div id="toast" class="toast"></div>
    </main>
  </div>
</div>

<script src="../shared/auth.js"></script>
<script src="../shared/api.js?v=2"></script>
<script>
var config = {};
var editProviderId = null;

async function init() {
  try { await Auth.init("admin"); } catch { return; }
  document.getElementById("topbarUser").textContent = Auth.user?.email || "";
  document.getElementById("sidebarUser").textContent = Auth.user?.email || "";
  document.getElementById("refreshBtn").addEventListener("click", loadConfig);
  document.getElementById("addProviderBtn").addEventListener("click", function() { openModal(null); });
  document.getElementById("addModelBtn").addEventListener("click", addModelRow);
  document.getElementById("saveModalBtn").addEventListener("click", saveModal);
  await loadConfig();
}

async function loadConfig() {
  try {
    var data = await Api.admin("/admin/model-config");
    config = data.modelConfig || {};
    renderProviders(config.modelProviders || []);
  } catch(e) { document.getElementById("providerList").innerHTML = '<div class="empty-state">加载失败</div>'; }
}

function renderProviders(providers) {
  var list = document.getElementById("providerList");
  if (!providers.length) { list.innerHTML = '<div class="empty-state">暂无模型供应商</div>'; return; }
  list.innerHTML = providers.map(function(p) {
    var models = p.models || [];
    return '<div class="provider-card">'
      + '<div class="provider-header">'
      + '<div><strong>' + esc(p.name||p.id) + '</strong> <span class="badge badge-neutral">' + esc(p.providerTypeLabel||p.providerType||'') + '</span>'
      + '<div class="provider-meta">' + esc(p.baseUrl||'') + ' · ' + models.length + ' 个模型</div></div>'
      + '<div class="flex gap-2"><label class="field" style="flex-direction:row;align-items:center;gap:var(--space-1)"><input type="checkbox" ' + (p.enabled?'checked':'') + ' onchange="toggleProvider(\''+p.id+'\',this.checked)" /><span class="text-sm">启用</span></label>'
      + '<button class="btn btn-ghost btn-sm" onclick="openModal(\''+p.id+'\')">编辑</button></div>'
      + '</div>'
      + (models.length ? '<table class="model-table"><thead><tr><th>模型原名</th><th>展示名</th><th>类别</th><th>优先级</th><th>状态</th></tr></thead><tbody>'
        + models.map(function(m) {
          return '<tr><td>' + esc(m.modelName||m.id) + '</td><td>' + esc(m.displayName||m.modelName||'') + '</td><td>' + (m.modelKind==='video'?'视频':'图片') + '</td><td>' + (m.priority||100) + '</td><td>' + (m.enabled?'启用':'禁用') + '</td></tr>';
        }).join('') + '</tbody></table>' : '')
      + '</div>';
  }).join("");
}

function toggleProvider(id, on) {
  var p = (config.modelProviders||[]).find(function(x){return x.id===id;});
  if (p) { p.enabled = on; saveConfig(); }
}

function openModal(providerId) {
  editProviderId = providerId;
  var p = providerId ? (config.modelProviders||[]).find(function(x){return x.id===providerId;}) : { id: 'provider_'+Date.now(), name:'', baseUrl:'', apiKey:'', providerType:'muskapis_image', providerTypeLabel:'Muskapis Image', enabled:true, models:[] };
  document.getElementById("modalTitle").textContent = providerId ? '编辑供应商' : '添加供应商';
  document.getElementById("provName").value = p.name||'';
  document.getElementById("provUrl").value = p.baseUrl||'';
  document.getElementById("provKey").value = p.apiKey||'';
  document.getElementById("provKey").placeholder = p.apiKey ? ('sk-****' + (p.apiKey.length > 8 ? p.apiKey.slice(-4) : '')) : '输入 API Key';
  window._editModels = (p.models||[]).map(function(m){return JSON.parse(JSON.stringify(m));});
  renderModelRows();
  // Populate default model selectors
  var allModels = [];
  (config.modelProviders||[]).forEach(function(pp) { (pp.models||[]).forEach(function(mm) { allModels.push({id:mm.id, name:mm.displayName||mm.modelName||mm.id, kind:mm.modelKind||'image'}); }); });
  var imgOpts = allModels.filter(function(m){return m.kind!=='video';}).map(function(m){return '<option value="'+m.id+'">'+esc(m.name)+'</option>';}).join('');
  var vidOpts = allModels.filter(function(m){return m.kind==='video';}).map(function(m){return '<option value="'+m.id+'">'+esc(m.name)+'</option>';}).join('');
  document.getElementById("defaultImageModel").innerHTML = '<option value="">-- 默认 --</option>'+imgOpts;
  document.getElementById("defaultVideoModel").innerHTML = '<option value="">-- 默认 --</option>'+vidOpts;
  document.getElementById("defaultImageModel").value = config.defaultImageModelId||"";
  document.getElementById("defaultVideoModel").value = config.defaultVideoModelId||"";
  document.getElementById("editModal").classList.add("open");
}

function renderModelRows() {
  document.getElementById("modelEditList").innerHTML = (window._editModels||[]).map(function(m,i) {
    return '<div class="model-edit-row">'
      + '<input class="input" value="'+escAttr(m.modelName||'')+'" placeholder="模型原名" data-idx="'+i+'" data-field="modelName" />'
      + '<input class="input" value="'+escAttr(m.displayName||'')+'" placeholder="展示名" data-idx="'+i+'" data-field="displayName" />'
      + '<select class="input" data-idx="'+i+'" data-field="modelKind"><option value="image" '+(m.modelKind!=='video'?'selected':'')+'>图片</option><option value="video" '+(m.modelKind==='video'?'selected':'')+'>视频</option></select>'
      + '<input class="input" type="number" value="'+(m.priority||100)+'" placeholder="优先级(数字越小越优先)" data-idx="'+i+'" data-field="priority" />'
      + '<button class="btn btn-ghost btn-sm" onclick="deleteModelRow('+i+')" style="color:var(--color-error)">✕</button>'
      + '</div>';
  }).join("");
}

function addModelRow() {
  window._editModels = window._editModels || [];
  window._editModels.push({ id: 'pmodel_'+Date.now(), modelName:'', displayName:'', modelKind:'image', priority:100, enabled:true });
  renderModelRows();
}

function deleteModelRow(i) {
  window._editModels.splice(i,1);
  renderModelRows();
}

function closeModal() { document.getElementById("editModal").classList.remove("open"); }

async function saveModal() {
  var p = editProviderId ? (config.modelProviders||[]).find(function(x){return x.id===editProviderId;}) : null;
  if (!p) { p = { id: 'provider_'+Date.now(), providerType:'muskapis_image', providerTypeLabel:'Muskapis Image', enabled:true }; if (!config.modelProviders) config.modelProviders = []; config.modelProviders.push(p); editProviderId = p.id; }
  p.name = document.getElementById("provName").value.trim();
  p.baseUrl = document.getElementById("provUrl").value.trim();
  p.apiKey = document.getElementById("provKey").value.trim();

  // Collect model edits from inputs
  document.querySelectorAll("#modelEditList [data-idx]").forEach(function(inp){
    var i = parseInt(inp.getAttribute("data-idx"));
    var field = inp.getAttribute("data-field");
    if (window._editModels[i]) window._editModels[i][field] = field==='priority' ? parseInt(inp.value)||100 : inp.value;
  });
  p.models = window._editModels || [];
  config.defaultImageModelId = document.getElementById("defaultImageModel").value;
  config.defaultVideoModelId = document.getElementById("defaultVideoModel").value;

  await saveConfig();
  closeModal();
  loadConfig();
  toast("已保存");
}

async function saveConfig() {
  try {
    await Api.admin("/admin/model-config", { method:"PUT", body:{ modelProviders: config.modelProviders||[], defaultImageModelId: config.defaultImageModelId||"", defaultVideoModelId: config.defaultVideoModelId||"" } });
  } catch(e){ toast(e.message, true); }
}

function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escAttr(s) { return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;"); }
function toast(msg, isErr) { var t=document.getElementById("toast"); t.textContent=msg; t.className="toast active"+(isErr?" error":""); clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove("active")},2600); }

init();
</script>
</body>
</html>
