<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>用户管理 — AI 智能图片编辑器 · 后台管理</title>
  <link rel="stylesheet" href="../shared/styles.css?v=5" />
  <style>
    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: var(--font-size-sm); }
    th { text-align: left; padding: var(--space-2) var(--space-3); font-weight: var(--font-weight-semibold); color: var(--color-text-secondary); border-bottom: 2px solid var(--color-border); white-space: nowrap; }
    td { padding: var(--space-3); border-bottom: 1px solid var(--color-border); vertical-align: middle; }
    tr:hover td { background: var(--color-bg); }
    .shell-content { max-width: 100%; }

    /* ── Credit tooltip ── */
    .credit-cell { position: relative; cursor: default; }
    .credit-cell:hover .credit-tooltip { display: block; }
    .credit-tooltip {
      display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
      background: var(--color-primary); color: #fff; padding: var(--space-3); border-radius: var(--radius-md);
      font-size: var(--font-size-xs); white-space: nowrap; z-index: 100; min-width: 200px; margin-bottom: 4px;
    }
    .credit-tooltip .row { display: flex; justify-content: space-between; gap: var(--space-4); padding: 2px 0; }
    .credit-tooltip .row .label { color: rgba(255,255,255,0.7); }
    .credit-tooltip .divider { border-top: 1px solid rgba(255,255,255,0.2); margin: 4px 0; }
    .credit-tooltip .deduction { color: var(--color-error); font-size: 10px; max-height: 120px; overflow-y: auto; }

    /* ── Status badge ── */
    .user-status { display: inline-flex; align-items: center; gap: 6px; }
    .user-status .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .user-status .dot.active { background: var(--color-success); }
    .user-status .dot.disabled { background: var(--color-error); }

    /* ── Operations ── */
    .op-group { display: flex; gap: var(--space-2); }

    /* ── Loading / empty ── */
    .empty-state { text-align: center; padding: var(--space-10); color: var(--color-text-muted); }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--color-border); border-top-color: var(--color-accent); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: var(--space-2); }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="shell">
    <!-- Sidebar -->
    <aside class="shell-sidebar">
      <div class="sidebar-brand">AI Image Studio</div>
      <nav class="sidebar-nav">
          <a href="./index.html" >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> 首页
          </a>
          <a href="./users.html" class="active">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> 用户管理
          </a>
          <a href="./models.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg> 模型配置
          </a>
          <a href="./prompts.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/><line x1="12" y1="22" x2="12" y2="15.5"/><polyline points="22 8.5 12 15.5 2 8.5"/></svg> 提示词配置
          </a>
          <a href="./factory.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2"/></svg> 提示词工厂
          </a>
          <a href="./redeem.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg> 兑换码
          </a>
          <a href="./logs.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> 生成记录
          </a>
        </nav>
      <div class="sidebar-footer">
        <span>B端管理台</span>
      </div>
    </aside>

    <!-- Main -->
    <div class="shell-main">
      <header class="shell-topbar">
        <h2 style="font-size:var(--font-size-lg);">用户管理</h2>
        <div class="flex items-center gap-4">
          <a href="../index.html" class="btn btn-ghost btn-sm">C端</a>
        <span id="topbarUser" class="text-sm text-secondary"></span>
          <button class="btn btn-ghost btn-sm" id="logoutBtn" type="button">退出</button>
        </div>
      </header>

      <section class="shell-content">
        <div class="card" style="padding:var(--space-4);">
          <div class="flex items-center justify-between" style="margin-bottom:var(--space-4);">
            <span id="userCount" class="text-sm text-muted"></span>
            <button class="btn btn-ghost btn-sm" id="refreshBtn" type="button">刷新</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>邮箱</th>
                  <th>姓名</th>
                  <th>角色</th>
                  <th>积分</th>
                  <th>状态</th>
                  <th>在用模型</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="userTableBody">
                <tr><td colspan="7"><div class="empty-state"><span class="spinner"></span>加载中…</div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="../shared/auth.js"></script>
  <script src="../shared/api.js?v=2"></script>

  <script>
    "use strict";

    /* ── Elements ── */
    const topbarUser = document.getElementById("topbarUser");
    const userCount = document.getElementById("userCount");
    const userTableBody = document.getElementById("userTableBody");
    const refreshBtn = document.getElementById("refreshBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const toastEl = document.getElementById("toast");

    /* ── Toast ── */
    function toast(msg, isError) {
      toastEl.textContent = msg;
      toastEl.classList.toggle("error", !!isError);
      toastEl.classList.add("active");
      clearTimeout(toastEl._t);
      toastEl._t = setTimeout(function () { toastEl.classList.remove("active"); }, 3000);
    }

    /* ── Render ── */
    function renderUsers(users) {
      userCount.textContent = "共 " + users.length + " 个用户";

      if (!users.length) {
        userTableBody.innerHTML = '<tr><td colspan="7"><div class="empty-state">暂无用户数据</div></td></tr>';
        return;
      }

      userTableBody.innerHTML = users.map(function (u) {
        var disabled = u.disabled;
        var roleBadge = u.role === "admin"
          ? '<span class="badge badge-warning">管理员</span>'
          : '<span class="badge badge-neutral">用户</span>';

        var remaining = u.creditsRemaining != null ? u.creditsRemaining : 0;
        var total = u.credits != null ? u.credits : 0;

        /* Credit tooltip: deduction history */
        var deductionHtml = "";
        if (u.recentDeductions && u.recentDeductions.length) {
          var lines = u.recentDeductions.map(function (d) {
            var label = d.hasTemplate ? "模板生成" : "自由生成";
            var time = (d.createdAt || "").slice(0, 16).replace("T", " ");
            return '<div class="row"><span>' + label + '</span><span>' + time + '</span><span>-' + d.count + '</span></div>';
          }).join("");
          deductionHtml = '<div class="divider"></div><div class="deduction">' + lines + '</div>';
        }

        var creditCell = '<td class="credit-cell">'
          + '<span class="font-medium">' + remaining + '</span>'
          + '<span class="text-muted"> / ' + total + '</span>'
          + '<div class="credit-tooltip">'
          + '<div class="row"><span class="label">剩余</span><span class="font-semibold">' + remaining + '</span></div>'
          + '<div class="row"><span class="label">总额</span><span>' + total + '</span></div>'
          + '<div class="row"><span class="label">已用</span><span>' + (u.creditsUsed || 0) + '</span></div>'
          + deductionHtml
          + '</div></td>';

        var statusCell = '<td><div class="user-status">'
          + '<span class="dot ' + (disabled ? 'disabled' : 'active') + '"></span>'
          + '<span>' + (disabled ? '已禁用' : '正常') + '</span>'
          + '</div></td>';

        var imgModels = u.allowedImageModels || [];
        var modelCell = '<td class="model-cell"><span class="text-sm">'
          + (imgModels.length ? imgModels.map(function(m) { return m.displayName || m.modelName || ''; }).filter(Boolean).join(', ') : '<span class="text-muted">默认模型</span>')
          + '</span></td>';

        var opsCell = '<td><div class="op-group">'
          + (disabled
            ? '<button class="btn btn-secondary btn-sm" data-action="enable" data-id="' + u.id + '">启用</button>'
            : '<button class="btn btn-danger btn-sm" data-action="disable" data-id="' + u.id + '">禁用</button>')
          + '<button class="btn btn-secondary btn-sm" data-action="models" data-id="' + u.id + '" style="margin-left:4px">选择模型</button>'
          + '</div></td>';

        return '<tr>'
          + '<td class="font-medium">' + escapeHtml(u.email || "") + '</td>'
          + '<td>' + escapeHtml(u.name || "-") + '</td>'
          + '<td>' + roleBadge + '</td>'
          + creditCell
          + statusCell
          + modelCell
          + opsCell
          + '</tr>';
      }).join("");
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
    var esc = escapeHtml;

    /* ── Load data ── */
    async function loadUsers() {
      userTableBody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><span class="spinner"></span>加载中…</div></td></tr>';
      try {
        var data = await Api.admin("/admin/users");
        renderUsers(data.users || []);
      } catch (e) {
        if (!e.authFailure) {
          userTableBody.innerHTML = '<tr><td colspan="7"><div class="empty-state">加载失败: ' + escapeHtml(e.message) + '</div></td></tr>';
          toast(e.message, true);
        }
      }
    }

    /* ── Toggle user ── */
    async function toggleUser(userId, disabled) {
      try {
        await Api.admin("/admin/users/" + encodeURIComponent(userId), {
          method: "PATCH",
          body: { disabled: disabled }
        });
        toast(disabled ? "用户已禁用" : "用户已启用");
        loadUsers();
      } catch (e) {
        toast(e.message, true);
      }
    }

    /* ── Events ── */
    userTableBody.addEventListener("click", function (e) {
      var btn = e.target.closest("button[data-action]");
      if (!btn) return;
      var userId = btn.getAttribute("data-id");
      var action = btn.getAttribute("data-action");
      if (action === "disable") toggleUser(userId, true);
      else if (action === "enable") toggleUser(userId, false);
      else if (action === "models") openModelModal(userId);
    });

    refreshBtn.addEventListener("click", loadUsers);

    logoutBtn.addEventListener("click", function () {
      Auth.logout();
    });

    /* ── Model Selection ── */
    var curModelUserId = null, curModelTab = "image", allModels = [], selModelIds = [];

    async function loadAllModels() {
      var data = await Api.admin("/admin/model-config");
      var providers = (data.modelConfig && data.modelConfig.modelProviders) || [];
      allModels = [];
      providers.forEach(function(p) {
        (p.models || []).forEach(function(m) {
          allModels.push({ id: m.id || m.providerModelId, name: m.modelName, kind: m.modelKind || "image", provider: p.name });
        });
      });
    }

    function switchModelTab(tab) {
      curModelTab = tab;
      document.getElementById("tabImage").className = tab === "image" ? "btn btn-secondary btn-sm" : "btn btn-ghost btn-sm";
      document.getElementById("tabVideo").className = tab === "video" ? "btn btn-secondary btn-sm" : "btn btn-ghost btn-sm";
      renderModelList();
    }

    function renderModelList() {
      var filtered = allModels.filter(function(m) { return m.kind === curModelTab; });
      var list = document.getElementById("modelList");
      list.innerHTML = filtered.length ? filtered.map(function(m) {
        return '<label class="flex items-center gap-2" style="padding:var(--space-1) 0;cursor:pointer">'
          + '<input type="checkbox" value="' + m.id + '" ' + (selModelIds.indexOf(m.id) >= 0 ? 'checked' : '') + ' onchange="toggleModel(\'' + m.id + '\',this.checked)" />'
          + '<span class="text-sm">' + esc(m.name) + '</span><span class="badge badge-neutral">' + esc(m.provider) + '</span></label>';
      }).join("") : '<div class="text-muted text-sm" style="text-align:center;padding:var(--space-4)">无可用模型</div>';
      document.getElementById("modelInfo").textContent = "已选 " + selModelIds.length + " 个";
    }

    function toggleModel(id, checked) {
      if (checked) { if (selModelIds.indexOf(id) < 0) selModelIds.push(id); }
      else { selModelIds = selModelIds.filter(function(x) { return x !== id; }); }
    }

    async function openModelModal(userId) {
      curModelUserId = userId;
      selModelIds = [];
      document.getElementById("modelUserId").textContent = userId.substring(0, 12) + "...";
      await loadAllModels();
      switchModelTab("image");
      document.getElementById("modelModal").style.display = "flex";
    }

    function closeModelModal() { document.getElementById("modelModal").style.display = "none"; }

    async function saveModels() {
      try {
        await Api.admin("/admin/users/" + curModelUserId, {
          method: "PATCH",
          body: JSON.stringify({ allowedImageModelIds: curModelTab === "image" ? selModelIds : undefined, allowedVideoModelIds: curModelTab === "video" ? selModelIds : undefined })
        });
        toast("模型已更新"); closeModelModal(); loadUsers();
      } catch(e) { toast(e.message, true); }
    }

    /* ── Init ── */
    async function init() {
      try {
        var user = await Auth.init("admin");
        topbarUser.textContent = user.email || "";
        loadUsers();
      } catch (e) {
        /* Auth.init handles redirect */
      }
    }

    init();
  </script>
  <!-- Model Selection Modal -->
  <div id="modelModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:none;align-items:center;justify-content:center">
    <div class="card" style="width:90%;max-width:600px;max-height:80vh;overflow-y:auto">
      <div class="flex items-center justify-between" style="margin-bottom:var(--space-4)">
        <h3>选择模型 - <span id="modelUserId"></span></h3>
        <button class="btn btn-ghost btn-sm" onclick="closeModelModal()">✕</button>
      </div>
      <div class="flex gap-2" style="margin-bottom:var(--space-4)">
        <button class="btn btn-secondary btn-sm" id="tabImage" onclick="switchModelTab('image')">图片模型</button>
        <button class="btn btn-ghost btn-sm" id="tabVideo" onclick="switchModelTab('video')">视频模型</button>
      </div>
      <div id="modelList" style="max-height:400px;overflow-y:auto"></div>
      <div class="flex justify-between" style="margin-top:var(--space-4)">
        <span class="text-sm text-muted" id="modelInfo"></span>
        <button class="btn btn-primary btn-sm" onclick="saveModels()">保存</button>
      </div>
    </div>
  </div>
</body>
</html>
