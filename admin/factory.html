<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>提示词工厂 - AI Image Studio B端</title>
  <link rel="stylesheet" href="../shared/styles.css" />
  <style>
    .factory-layout { display: grid; grid-template-columns: 280px 1fr; gap: var(--space-6); min-height: 60vh; }
    .asset-list { display: flex; flex-direction: column; gap: var(--space-1); max-height: 70vh; overflow-y: auto; }
    .asset-item { padding: var(--space-2) var(--space-3); border-radius: var(--radius-md); cursor: pointer; font-size: var(--font-size-sm); transition: background var(--transition-fast); }
    .asset-item:hover { background: var(--color-bg); }
    .asset-item.active { background: var(--color-accent); color: #fff; }
    .asset-item .meta { font-size: var(--font-size-xs); opacity: 0.7; }
    .detail-panel { display: flex; flex-direction: column; gap: var(--space-4); }
    .ref-grid { display: flex; gap: var(--space-2); flex-wrap: wrap; }
    .ref-thumb { width: 100px; height: 100px; border: 1.5px solid var(--color-border); border-radius: var(--radius-md); overflow: hidden; }
    .ref-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .prompt-box { background: var(--color-bg); padding: var(--space-3); border-radius: var(--radius-md); font-size: var(--font-size-sm); line-height: var(--line-height-relaxed); min-height: 40px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
    .verify-grid { display: flex; gap: var(--space-4); flex-wrap: wrap; }
    .verify-card { flex: 1; min-width: 200px; }
    .verify-card img { width: 100%; border-radius: var(--radius-md); border: 1px solid var(--color-border); }
    .filter-row { display: flex; gap: var(--space-2); margin-bottom: var(--space-3); }
    @media (max-width: 900px) { .factory-layout { grid-template-columns: 1fr; } .asset-list { max-height: 200px; } }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="shell">
  <aside class="shell-sidebar">
    <div class="sidebar-brand">AI Image Studio B端</div>
    <nav class="sidebar-nav">
      <a href="./index.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> 首页</a>
      <a href="./users.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> 用户管理</a>
      <a href="./models.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> 模型配置</a>
      <a href="./prompts.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/><line x1="12" y1="22" x2="12" y2="15.5"/><polyline points="22 8.5 12 15.5 2 8.5"/></svg> 提示词配置</a>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2"/></svg> 提示词工厂</a>
      <a href="./redeem.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg> 兑换码</a>
      <a href="./logs.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> 生成记录</a>
    </nav>
    <div class="sidebar-footer" id="sidebarUser"></div>
  </aside>

  <div class="shell-main">
    <header class="shell-topbar">
      <span class="font-medium">提示词工厂</span>
      <div class="flex items-center gap-4">
        <a href="../index.html" class="btn btn-ghost btn-sm">C端</a>
        <span class="text-sm text-secondary" id="topbarUser"></span>
        <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">退出</button>
      </div>
    </header>

    <main class="shell-content">
      <div class="flex items-center justify-between" style="margin-bottom:var(--space-4)">
        <div class="filter-row">
          <select class="input" style="width:auto" id="kindFilter" onchange="loadAssets()">
            <option value="single">单图</option>
            <option value="suite">套图</option>
          </select>
          <button class="btn btn-ghost btn-sm" onclick="loadAssets()">刷新</button>
        </div>
        <button class="btn btn-primary btn-sm" onclick="createAsset()">新建</button>
      </div>

      <div class="factory-layout">
        <div class="card" style="padding:var(--space-3)">
          <div class="asset-list" id="assetList"></div>
          <div style="text-align:center;margin-top:var(--space-2)" id="loadMore"></div>
        </div>
        <div class="card detail-panel" id="detailPanel">
          <div class="text-muted text-sm" style="text-align:center;padding:var(--space-8)">选择左侧资产或新建</div>
        </div>
      </div>

      <div id="toast" class="toast"></div>
    </main>
  </div>
</div>

<script src="../shared/auth.js"></script>
<script src="../shared/api.js?v=2"></script>
<script>
var assets = [], activeId = null, page = 0, pageSize = 20;

async function init() {
  try { await Auth.init("admin"); } catch { return; }
  document.getElementById("topbarUser").textContent = Auth.user?.email || "";
  document.getElementById("sidebarUser").textContent = Auth.user?.email || "";
  await loadAssets();
}

async function loadAssets() {
  var kind = document.getElementById("kindFilter").value;
  page = 0; assets = []; activeId = null;
  await loadPage();
}

async function loadPage() {
  var kind = document.getElementById("kindFilter").value;
  var offset = page * pageSize;
  try {
    var data = await Api.admin("/admin/prompt-assets?limit=" + pageSize + "&offset=" + offset + "&assetKind=" + kind);
    var list = data.promptAssets || data.assets || [];
    if (list.length) { assets = assets.concat(list); page++; }
    renderList();
    var moreBtn = document.getElementById("loadMore");
    moreBtn.innerHTML = list.length === pageSize
      ? '<button class="btn btn-ghost btn-sm" onclick="loadPage()">加载更多</button>'
      : (assets.length ? '' : '<div class="text-muted text-sm">暂无资产</div>');
  } catch(e) {
    document.getElementById("assetList").innerHTML = '<div class="text-muted text-sm" style="text-align:center;padding:var(--space-4)">加载失败</div>';
  }
}

function renderList() {
  var list = document.getElementById("assetList");
  var statusLabel = {draft:"草稿",generating:"生成中",generated:"已生成",published:"已发布",failed:"失败"};
  list.innerHTML = assets.map(function(a) {
    return '<div class="asset-item' + (a.id === activeId ? ' active' : '') + '">'
      + '<div style="display:flex;align-items:center;justify-content:space-between">'
      + '<span class="asset-title" id="title-' + a.id + '">' + esc(a.title || "未命名") + '</span>'
      + '<button class="btn btn-ghost btn-sm" style="font-size:10px;padding:0 4px" onclick="event.stopPropagation();startEditTitle(\'' + a.id + '\')">✎</button>'
      + '</div>'
      + '<div class="meta">' + (statusLabel[a.status] || a.status) + '</div>'
      + '</div>';
  }).join("");
}

function startEditTitle(id) {
  var el = document.getElementById("title-" + id);
  if (!el) return;
  var asset = assets.find(function(a) { return a.id === id; });
  var oldTitle = asset ? asset.title : el.textContent;
  el.innerHTML = '<input class="input" value="' + escAttr(oldTitle) + '" style="font-size:var(--font-size-sm);padding:2px 4px" onblur="saveTitle(\'' + id + '\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()" />';
  el.querySelector("input").focus();
  el.querySelector("input").select();
}

async function saveTitle(id, newTitle) {
  newTitle = (newTitle || "").trim();
  if (!newTitle) { renderList(); return; }
  try {
    await Api.admin("/admin/prompt-assets/" + id, { method: "PATCH", body: JSON.stringify({ title: newTitle }) });
    var a = assets.find(function(x) { return x.id === id; });
    if (a) a.title = newTitle;
  } catch(e) { showToast(e.message, true); }
  renderList();
}

async function selectAsset(id) {
  activeId = id; renderList();
  document.getElementById("detailPanel").innerHTML = '<div style="text-align:center;padding:var(--space-8)"><div style="display:inline-block;width:28px;height:28px;border:3px solid var(--color-border);border-top-color:var(--color-accent);border-radius:50%;animation:spin 0.7s linear infinite;margin-bottom:var(--space-2)"></div><div class="text-muted text-sm">加载详情...</div></div>';
  var asset = assets.find(function(a) { return a.id === id; });
  try { asset = await Api.admin("/admin/prompt-assets/" + id); } catch(e) { 
    document.getElementById("detailPanel").innerHTML = '<div class="text-muted text-sm" style="text-align:center;padding:var(--space-8)">加载失败: ' + esc(e.message) + '</div>';
    return; 
  }
  var panel = document.getElementById("detailPanel");
  var refs = (asset.referenceImages || []).map(function(r) { return r.url || r; }).filter(Boolean);
  var productImg = (asset.productImage || {}).url || "";
  var statusLabel = {draft:"草稿",generating:"生成中",generated:"已生成",published:"已发布",failed:"失败"};

  // Build images row: product + refs
  var imgRow = '';
  var imgs = [];
  if (productImg) imgs.push({label:'商品原图', url:productImg});
  (asset.referenceImages || []).forEach(function(r, i) {
    if (r.url) imgs.push({label: r.name || ('参考图' + (i+1)), url: r.url});
  });
  if (imgs.length) {
    imgRow = '<div style="margin-bottom:var(--space-4)"><h4 class="text-sm font-medium" style="margin-bottom:var(--space-2)">原图 & 参考图</h4><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:var(--space-3)">'
      + imgs.map(function(x){ return '<div><div class="text-xs text-muted" style="margin-bottom:2px">' + esc(x.label) + '</div><img src="' + escAttr(x.url) + '" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--radius-md);border:1px solid var(--color-border)" /></div>'; }).join('')
      + '</div></div>';
  }

  // Verification images row
  var verifyRow = '';
  if (asset.imageAUrl || asset.imageBUrl) {
    verifyRow = '<div style="margin-bottom:var(--space-4)"><h4 class="text-sm font-medium" style="margin-bottom:var(--space-2)">验证对比</h4><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:var(--space-3)">'
      + (asset.imageAUrl ? '<div><div class="text-xs text-muted" style="margin-bottom:2px">Image A (参考辅助)</div><img src="' + escAttr(asset.imageAUrl) + '" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--radius-md);border:1px solid var(--color-border)" /></div>' : '')
      + (asset.imageBUrl ? '<div><div class="text-xs text-muted" style="margin-bottom:2px">Image B (Prompt + 原图)</div><img src="' + escAttr(asset.imageBUrl) + '" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--radius-md);border:1px solid var(--color-border)" /></div>' : '')
      + '</div></div>';
  }

  panel.innerHTML = '<div class="flex items-center justify-between" style="margin-bottom:var(--space-4)">'
    + '<h3>' + esc(asset.title || "未命名") + ' <span class="badge badge-neutral">' + (statusLabel[asset.status] || asset.status) + '</span></h3>'
    + '<div class="flex gap-2">'
    + (asset.status === 'draft' || asset.status === 'failed' ? '<button class="btn btn-primary btn-sm" onclick="generateAsset(\'' + id + '\')">生成</button>' : '')
    + (asset.status === 'generated' ? '<button class="btn btn-primary btn-sm" onclick="publishAsset(\'' + id + '\')">发布</button>' : '')
    + '<button class="btn btn-danger btn-sm" onclick="deleteAsset(\'' + id + '\')">删除</button>'
    + '</div></div>'
    + imgRow
    + verifyRow
    + (asset.comparison ? '<div style="margin-bottom:var(--space-4)"><h4 class="text-sm font-medium">相似度对比</h4><div class="prompt-box">' + esc(asset.comparison) + '</div></div>' : '')
    + (asset.referenceAnalysis ? '<div style="margin-bottom:var(--space-4)"><h4 class="text-sm font-medium">参考图分析</h4><div class="prompt-box">' + esc(asset.referenceAnalysis) + '</div></div>' : '')
    + (asset.chinesePrompt ? '<div style="margin-bottom:var(--space-4)"><h4 class="text-sm font-medium">中文提示词</h4><div class="prompt-box">' + esc(asset.chinesePrompt) + '</div></div>' : '')
    + (asset.englishPrompt ? '<div style="margin-bottom:var(--space-4)"><h4 class="text-sm font-medium">English Prompt</h4><div class="prompt-box">' + esc(asset.englishPrompt) + '</div></div>' : '')
    + (asset.error ? '<div class="badge badge-error">错误: ' + esc(asset.error) + '</div>' : '');
}

async function createAsset() {
  var title = prompt("资产名称:", "Factory " + new Date().toISOString().slice(0,16).replace("T"," "));
  if (!title) return;
  var kind = document.getElementById("kindFilter").value;
  try {
    var resp = await Api.admin("/admin/prompt-assets", { method: "POST", body: JSON.stringify({ assetKind: kind, title: title }) });
    showToast("已创建");
    await loadAssets();
    selectAsset(resp.id);
  } catch(e) { showToast(e.message, true); }
}

async function generateAsset(id) { showToast("生成中..."); try { await Api.admin("/admin/prompt-assets/" + id + "/generate", { method: "POST" }); showToast("完成"); loadAssets(); selectAsset(id); } catch(e) { showToast(e.message, true); } }
async function publishAsset(id) { if (!confirm("发布？")) return; try { await Api.admin("/admin/prompt-assets/" + id + "/publish", { method: "POST" }); showToast("已发布"); loadAssets(); } catch(e) { showToast(e.message, true); } }
async function deleteAsset(id) { if (!confirm("删除？")) return; try { await Api.admin("/admin/prompt-assets/" + id, { method: "DELETE" }); showToast("已删除"); activeId = null; loadAssets(); document.getElementById("detailPanel").innerHTML = '<div class="text-muted text-sm" style="text-align:center;padding:var(--space-8)">选择左侧资产或新建</div>'; } catch(e) { showToast(e.message, true); } }

function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escAttr(s) { return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;"); }
function showToast(msg, isErr) { var t=document.getElementById("toast"); t.textContent=msg; t.className="toast active"+(isErr?" error":""); clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove("active")},2600); }

init();
</script>
</body>
</html>
