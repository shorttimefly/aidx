<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>提示词工厂 - AI Image Studio B端</title>
  <link rel="stylesheet" href="../shared/styles.css" />
  <style>
    .factory-layout { display: grid; grid-template-columns: 280px 1fr; gap: var(--space-6); min-height: 60vh; }
    .asset-list { display: flex; flex-direction: column; gap: var(--space-1); max-height: 70vh; overflow-y: auto; }
    .asset-item { padding: var(--space-2) var(--space-3); border-radius: var(--radius-md); cursor: pointer; font-size: var(--font-size-sm); transition: background var(--transition-fast); }
    .asset-item:hover { background: var(--color-bg); }
    .asset-item.active { background: var(--color-accent); color: #fff; }
    .asset-item .meta { font-size: var(--font-size-xs); opacity: 0.7; }
    .detail-panel { display: flex; flex-direction: column; gap: var(--space-4); }
    .ref-grid { display: flex; gap: var(--space-2); flex-wrap: wrap; }
    .ref-thumb { width: 100px; height: 100px; border: 1.5px solid var(--color-border); border-radius: var(--radius-md); overflow: hidden; cursor: pointer; }
    .ref-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .prompt-box { background: var(--color-bg); padding: var(--space-3); border-radius: var(--radius-md); font-size: var(--font-size-sm); line-height: var(--line-height-relaxed); min-height: 60px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
    .verify-grid { display: flex; gap: var(--space-4); flex-wrap: wrap; }
    .verify-card { flex: 1; min-width: 200px; }
    .verify-card img { width: 100%; border-radius: var(--radius-md); border: 1px solid var(--color-border); }
    .filter-row { display: flex; gap: var(--space-2); margin-bottom: var(--space-3); }
    @media (max-width: 900px) { .factory-layout { grid-template-columns: 1fr; } .asset-list { max-height: 200px; } }
  </style>
</head>
<body>
<div class="shell">
  <aside class="shell-sidebar">
    <div class="sidebar-brand">AI Image Studio B端</div>
    <nav class="sidebar-nav">
      <a href="./index.html">首页</a>
      <a href="./users.html">用户管理</a>
      <a href="./models.html">模型配置</a>
      <a href="./prompts.html">提示词配置</a>
      <a href="./factory.html" class="active">提示词工厂</a>
      <a href="./redeem.html">兑换码</a>
      <a href="./logs.html">生成记录</a>
    </nav>
    <div class="sidebar-footer" id="sidebarUser"></div>
  </aside>

  <div class="shell-main">
    <header class="shell-topbar">
      <span class="font-medium">提示词工厂</span>
      <div class="flex items-center gap-4">
        <a href="../index.html" class="btn btn-ghost btn-sm">C端</a>
        <span class="text-sm text-secondary" id="topbarUser"></span>
        <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">退出</button>
      </div>
    </header>

    <main class="shell-content">
      <div class="flex items-center justify-between" style="margin-bottom:var(--space-4)">
        <div class="filter-row">
          <select id="kindFilter" class="input" style="width:auto" onchange="loadAssets()">
            <option value="single">单图</option>
            <option value="suite">套图</option>
          </select>
          <select id="statusFilter" class="input" style="width:auto" onchange="loadAssets()">
            <option value="">全部状态</option>
            <option value="draft">草稿</option>
            <option value="generated">已生成</option>
            <option value="published">已发布</option>
            <option value="failed">失败</option>
          </select>
          <button class="btn btn-ghost btn-sm" onclick="loadAssets()">刷新</button>
        </div>
        <button class="btn btn-primary btn-sm" onclick="createAsset()">新建</button>
      </div>

      <div class="factory-layout">
        <div class="card" style="padding:var(--space-3)">
          <div class="asset-list" id="assetList">
            <div class="text-muted text-sm" style="text-align:center;padding:var(--space-4)">加载中...</div>
          </div>
        </div>

        <div class="card detail-panel" id="detailPanel">
          <div class="text-muted text-sm" style="text-align:center;padding:var(--space-8)">选择左侧资产或新建</div>
        </div>
      </div>

      <div id="toast" class="toast"></div>
    </main>
  </div>
</div>

<script src="../shared/auth.js"></script>
<script src="../shared/api.js"></script>
<script>
let assets = [], activeId = null;

async function init() {
  try { await Auth.init("admin"); } catch { return; }
  document.getElementById("topbarUser").textContent = Auth.user?.email || "";
  document.getElementById("sidebarUser").textContent = Auth.user?.email || "";
  await loadAssets();
}

async function loadAssets() {
  const kind = document.getElementById("kindFilter").value;
  const status = document.getElementById("statusFilter").value;
  let url = `/prompt-assets?limit=100&assetKind=${kind}`;
  if (status) url += `&status=${status}`;
  try {
    const data = await Api.admin(url);
    assets = data.promptAssets || data.assets || [];
    renderList();
  } catch(e) {
    document.getElementById("assetList").innerHTML = `<div class="text-muted text-sm" style="text-align:center;padding:var(--space-4)">加载失败</div>`;
  }
}

function renderList() {
  const list = document.getElementById("assetList");
  if (!assets.length) {
    list.innerHTML = `<div class="text-muted text-sm" style="text-align:center;padding:var(--space-4)">暂无资产</div>`;
    return;
  }
  const statusLabel = {draft:"草稿",generating:"生成中",generated:"已生成",published:"已发布",failed:"失败"};
  list.innerHTML = assets.map(a => `
    <div class="asset-item ${a.id === activeId ? 'active' : ''}" onclick="selectAsset('${a.id}')">
      <div>${esc(a.title || "未命名")}</div>
      <div class="meta">${statusLabel[a.status] || a.status} · ${fmtTime(a.updatedAt || a.createdAt)}</div>
    </div>
  `).join("");
}

async function selectAsset(id) {
  activeId = id;
  renderList();
  const asset = assets.find(a => a.id === id) || await Api.admin(`/prompt-assets/${id}`);
  if (!asset) return;
  const panel = document.getElementById("detailPanel");
  const refs = (asset.referenceImages || []).map(r => r.url || r).filter(Boolean);
  const productImg = asset.productImage?.url || "";
  panel.innerHTML = `
    <div class="flex items-center justify-between">
      <h3>${esc(asset.title || "未命名")} <span class="badge badge-neutral">${asset.status || ""}</span></h3>
      <div class="flex gap-2">
        ${asset.status === 'draft' || asset.status === 'failed' ? `<button class="btn btn-primary btn-sm" onclick="generateAsset('${id}')">生成</button>` : ''}
        ${asset.status === 'generated' ? `<button class="btn btn-primary btn-sm" onclick="publishAsset('${id}')">发布</button>` : ''}
        <button class="btn btn-danger btn-sm" onclick="deleteAsset('${id}')">删除</button>
      </div>
    </div>
    ${productImg ? `<div class="verify-card"><h4 class="text-sm font-medium">商品图</h4><img src="${escAttr(productImg)}" alt="商品图" /></div>` : ''}
    ${refs.length ? `<div><h4 class="text-sm font-medium" style="margin-bottom:var(--space-2)">参考图 (${refs.length})</h4><div class="ref-grid">${refs.map((r,i) => `<div class="ref-thumb"><img src="${escAttr(r)}" alt="参考${i+1}" /></div>`).join("")}</div></div>` : ''}
    ${asset.referenceAnalysis ? `<div><h4 class="text-sm font-medium">参考图分析</h4><div class="prompt-box">${esc(asset.referenceAnalysis)}</div></div>` : ''}
    ${asset.chinesePrompt ? `<div><h4 class="text-sm font-medium">中文提示词</h4><div class="prompt-box">${esc(asset.chinesePrompt)}</div></div>` : ''}
    ${asset.englishPrompt ? `<div><h4 class="text-sm font-medium">English Prompt</h4><div class="prompt-box">${esc(asset.englishPrompt)}</div></div>` : ''}
    ${asset.imageAUrl || asset.imageBUrl ? `<div><h4 class="text-sm font-medium">验证图</h4><div class="verify-grid">${asset.imageAUrl ? `<div class="verify-card"><div class="text-xs text-muted">Image A (参考辅助)</div><img src="${escAttr(asset.imageAUrl)}" /></div>` : ''}${asset.imageBUrl ? `<div class="verify-card"><div class="text-xs text-muted">Image B (Prompt + 原图)</div><img src="${escAttr(asset.imageBUrl)}" /></div>` : ''}</div></div>` : ''}
    ${asset.comparison ? `<div><h4 class="text-sm font-medium">对比审核</h4><div class="prompt-box">${esc(asset.comparison)}</div></div>` : ''}
    ${asset.error ? `<div class="badge badge-error">错误: ${esc(asset.error)}</div>` : ''}
  `;
}

async function createAsset() {
  const title = prompt("资产名称（可选）:", "Factory " + new Date().toISOString().slice(0,16).replace("T"," "));
  const kind = document.getElementById("kindFilter").value;
  try {
    const resp = await Api.admin("/prompt-assets", {
      method: "POST",
      body: JSON.stringify({ assetKind: kind, title: title || "未命名" })
    });
    showToast("已创建");
    await loadAssets();
    selectAsset(resp.id);
  } catch(e) { showToast(e.message, true); }
}

async function generateAsset(id) {
  showToast("生成中，约需 30-60 秒...");
  try {
    await Api.admin(`/prompt-assets/${id}/generate`, { method: "POST" });
    showToast("生成完成");
    await loadAssets();
    selectAsset(id);
  } catch(e) { showToast(e.message, true); }
}

async function publishAsset(id) {
  if (!confirm("发布到提示词配置？")) return;
  try {
    await Api.admin(`/prompt-assets/${id}/publish`, { method: "POST" });
    showToast("已发布");
    await loadAssets();
    selectAsset(id);
  } catch(e) { showToast(e.message, true); }
}

async function deleteAsset(id) {
  if (!confirm("确定删除？")) return;
  try {
    await Api.admin(`/prompt-assets/${id}`, { method: "DELETE" });
    showToast("已删除");
    activeId = null;
    await loadAssets();
    document.getElementById("detailPanel").innerHTML = `<div class="text-muted text-sm" style="text-align:center;padding:var(--space-8)">选择左侧资产或新建</div>`;
  } catch(e) { showToast(e.message, true); }
}

function fmtTime(iso) { if(!iso) return "-"; return new Date(iso).toLocaleString("zh-CN", {month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}); }
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escAttr(s) { return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;"); }
function showToast(msg, isErr) { const t=document.getElementById("toast"); t.textContent=msg; t.className="toast active"+(isErr?" error":""); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("active"),2600); }

init();
</script>
</body>
</html>
