<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Image Studio — 生成图片</title>
  <link rel="stylesheet" href="shared/styles.css?v=5" />
  <style>
    /* ── Page‑specific overrides (still flat / professional) ── */
    .shell-content { display: flex; gap: var(--space-6); align-items: flex-start; }
    .gen-panel { flex: 1; min-width: 0; }
    .result-panel { flex: 1; min-width: 0; }

    .dropzone {
      border: 2px dashed var(--color-border); border-radius: var(--radius-lg);
      padding: var(--space-8) var(--space-6); text-align: center; cursor: pointer;
      transition: border-color var(--transition-fast), background var(--transition-fast);
      background: var(--color-bg); position: relative;
    }
    .dropzone:hover, .dropzone.drag-over { border-color: var(--color-accent); background: rgba(8,145,178,0.04); }
    .dropzone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .dropzone strong { display: block; font-weight: var(--font-weight-semibold); margin-bottom: var(--space-1); }
    .dropzone span { font-size: var(--font-size-xs); color: var(--color-text-muted); }

    .ref-previews { display: flex; flex-wrap: wrap; gap: var(--space-2); margin-top: var(--space-3); }
    .ref-thumb { position: relative; width: 72px; height: 72px; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--color-border); flex-shrink: 0; }
    .ref-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .ref-thumb .ref-remove {
      position: absolute; top: 2px; right: 2px; width: 18px; height: 18px;
      border-radius: 50%; background: var(--color-error); color: #fff; border: none;
      font-size: 11px; line-height: 18px; text-align: center; cursor: pointer; padding: 0;
    }

    .selectors-row { display: flex; gap: var(--space-3); margin-top: var(--space-4); }
    .selectors-row .field { flex: 1; min-width: 0; }

    .controls-row { display: flex; gap: var(--space-3); margin-top: var(--space-4); }
    .controls-row .field { flex: 1; min-width: 0; }

    .generate-btn {
      width: 100%; margin-top: var(--space-5); padding: 0.75rem 1.5rem;
      font-size: var(--font-size-base); font-weight: var(--font-weight-semibold);
      background: var(--color-cta); color: #fff; border: none; border-radius: var(--radius-md);
      cursor: pointer; transition: background var(--transition-fast);
      display: flex; align-items: center; justify-content: center; gap: var(--space-2);
    }
    .generate-btn:hover:not(:disabled) { background: #0284c7; }
    .generate-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: var(--space-4); }
    .result-card {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); overflow: hidden;
    }
    .result-card img { width: 100%; display: block; aspect-ratio: 1; object-fit: cover; }
    .result-card .result-meta { padding: var(--space-2) var(--space-3); font-size: var(--font-size-xs); color: var(--color-text-muted); }

    .empty-state { display: flex; align-items: center; justify-content: center; min-height: 200px; color: var(--color-text-muted); text-align: center; }
    .empty-state strong { display: block; font-weight: var(--font-weight-medium); color: var(--color-text-secondary); margin-bottom: var(--space-1); }

    /* ── Modal (flat) ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(15,23,42,0.45); display: flex;
      align-items: center; justify-content: center; z-index: 1000;
      opacity: 0; pointer-events: none; transition: opacity var(--transition-normal);
    }
    .modal-backdrop.active { opacity: 1; pointer-events: auto; }
    .modal {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-xl); width: 90%; max-width: 420px; padding: var(--space-6);
    }
    .modal h3 { margin-bottom: var(--space-4); }
    .modal .modal-actions { display: flex; gap: var(--space-3); justify-content: flex-end; margin-top: var(--space-5); }
    .form-message { font-size: var(--font-size-xs); margin-top: var(--space-2); }
    .form-message.error { color: var(--color-error); }
    .form-message.success { color: var(--color-success); }

    .credits-summary { margin-bottom: var(--space-4); font-size: var(--font-size-sm); }
    .credits-summary p { margin-bottom: var(--space-1); }

    /* Sidebar credits */
    .sidebar-credits { display: flex; flex-direction: column; gap: var(--space-1); }
    .sidebar-credits strong { font-size: var(--font-size-lg); font-weight: var(--font-weight-bold); }

    /* Loading pulse */
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .loading-placeholder {
      aspect-ratio: 1; background: var(--color-bg); border-radius: var(--radius-md);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .generate-timer { text-align: center; padding: var(--space-12) var(--space-6); color: var(--color-text-muted); }
  </style>
</head>
<body>
  <div class="shell">
    <!-- ═══ SIDEBAR ═══ -->
    <aside class="shell-sidebar">
      <div class="sidebar-brand">AI Image Studio</div>
      <nav class="sidebar-nav">
        <a href="./index.html" class="active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          生成图片
        </a>
        <a href="./library.html">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h6l2 2h10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          素材库
        </a>
        <a href="./edit.html">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m14.7 6.3 3 3L8 19H5v-3z"/><path d="m13 8 3 3"/></svg>
          二次编辑
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-credits">
          <span class="text-muted">剩余积分</span>
          <div style="display:flex;align-items:baseline;justify-content:space-between">
            <strong id="sidebarCredits">—</strong>
            <button class="btn btn-primary btn-sm" id="openRedeemBtn" style="font-size:11px;padding:2px 8px">增加积分</button>
          </div>
        </div>
      </div>
    </aside>

    <!-- ═══ MAIN ═══ -->
    <div class="shell-main">
      <!-- Top bar -->
      <header class="shell-topbar">
        <span class="text-sm text-muted" id="topbarTagline">AI 电商图片生成</span>
        <div class="flex items-center gap-4">
          <a href="./admin/index.html" class="btn btn-ghost btn-sm" id="adminLink" style="display:none">B端</a>
          <span id="topbarUser" class="text-sm font-medium">—</span>
          <span class="badge badge-neutral" id="topbarCreditsBadge">积分 —</span>
          <button class="btn btn-ghost btn-sm" id="logoutBtn" type="button">退出</button>
        </div>
      </header>

      <!-- Content -->
      <div class="shell-content">
        <!-- Generation panel -->
        <section class="card gen-panel" aria-label="生成参数">
          <h3 style="margin-bottom:var(--space-4)">图片生成</h3>

          <!-- Reference image dropzone -->
          <div class="dropzone" id="dropzone">
            <input type="file" id="refInput" accept="image/*" multiple />
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-muted)" stroke-width="1.5" style="margin-bottom:var(--space-2)">
              <path d="M12 16V4"/><path d="m7 9 5-5 5 5"/><path d="M20 16v3a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-3"/>
            </svg>
            <strong>上传商品参考图</strong>
            <span>支持 JPG / PNG，最多 3 张</span>
          </div>
          <div class="ref-previews" id="refPreviews"></div>

          <!-- Template selectors -->
          <div class="selectors-row">
            <label class="field">
              <span>平台</span>
              <select id="platformSelect" disabled>
                <option value="">— 加载中 —</option>
              </select>
            </label>
            <label class="field">
              <span>品类</span>
              <select id="categorySelect" disabled>
                <option value="">— 先选择平台 —</option>
              </select>
            </label>
            <label class="field">
              <span>场景</span>
              <select id="scenarioSelect" disabled>
                <option value="">— 先选择品类 —</option>
              </select>
            </label>
          </div>

          <!-- Count + Size -->
          <div class="controls-row">
            <label class="field">
              <span>生成张数</span>
              <input type="number" id="countInput" min="1" max="8" value="1" />
            </label>
            <label class="field">
              <span>尺寸</span>
              <select id="sizeInput">
                <option value="1024x1024">1024 × 1024</option>
                <option value="1024x1792">1024 × 1792</option>
                <option value="1792x1024">1792 × 1024</option>
              </select>
            </label>
          </div>

          <!-- Generate button -->
          <button class="generate-btn" id="generateBtn" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 3 14h8l-1 8 11-13h-8z"/></svg>
            生成图片
          </button>
        </section>

        <!-- Results panel -->
        <section class="card result-panel" aria-label="生成结果">
          <h3 style="margin-bottom:var(--space-4)">生成结果</h3>
          <div id="resultGrid" class="result-grid">
            <div class="empty-state">
              <div>
                <strong>等待生成</strong>
                <span>图片将在这里展示</span>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <!-- ═══ CREDIT / REDEEM MODAL ═══ -->
  <div class="modal-backdrop" id="creditsModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="creditsModalTitle">
      <h3 id="creditsModalTitle">积分不足</h3>
      <div class="credits-summary">
        <p id="creditsRequiredRow">本次需要 <strong id="creditsRequiredText">0</strong> 积分</p>
        <p>当前剩余 <strong id="creditsRemainingModalText">0</strong> 积分</p>
      </div>
      <label class="field">
        <span>兑换码</span>
        <input type="text" id="creditsRedeemInput" placeholder="XXXX-XXXX-XXXX-XXXX" autocomplete="off" />
      </label>
      <p id="creditsRedeemMessage" class="form-message"></p>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="closeCreditsModalBtn" type="button">取消</button>
        <button class="btn btn-primary" id="submitRedeemBtn" type="button">兑换</button>
      </div>
      <div style="text-align:center;margin-top:var(--space-2)">
        <a href="https://item.taobao.com/item.htm?id=1059575526082&spm=a213gs.v2success.0.0.28eb48315dWcFz" target="_blank" rel="noopener" style="font-size:12px;color:var(--color-accent)">获取兑换码 →</a>
      </div>
    </div>
  </div>

  <!-- ═══ TOAST ═══ -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- ═══ SCRIPTS ═══ -->
  <script src="shared/auth.js"></script>
  <script src="shared/api.js"></script>
  <script>
  "use strict";

  // ── State ────────────────────────────────────────────────────────────────
  const state = {
    matrix: null,          // promptConfig.single.matrix (raw from server)
    defaults: null,        // matrix.defaults
    references: [],        // [{ name, size, url }] — data‑URL references
    generating: false
  };

  // ── DOM refs ─────────────────────────────────────────────────────────────
  const $ = (id) => document.getElementById(id);
  const els = {
    platformSelect:  $("platformSelect"),
    categorySelect:  $("categorySelect"),
    scenarioSelect:  $("scenarioSelect"),
    countInput:      $("countInput"),
    sizeInput:       $("sizeInput"),
    generateBtn:     $("generateBtn"),
    refInput:        $("refInput"),
    refPreviews:     $("refPreviews"),
    resultGrid:      $("resultGrid"),
    dropzone:        $("dropzone"),
    sidebarCredits:  $("sidebarCredits"),
    topbarUser:      $("topbarUser"),
    topbarCreditsBadge: $("topbarCreditsBadge"),
    logoutBtn:       $("logoutBtn"),
    toast:           $("toast"),
    creditsModal:    $("creditsModal"),
  };

  // ── Helpers ──────────────────────────────────────────────────────────────
  function escapeHtml(text) {
    const div = document.createElement("div");
    div.appendChild(document.createTextNode(String(text ?? "")));
    return div.innerHTML;
  }
  function attrEscape(value) {
    return String(value ?? "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  let toastTimer;
  function showToast(msg, isError) {
    clearTimeout(toastTimer);
    els.toast.textContent = msg;
    els.toast.className = "toast active" + (isError ? " error" : "");
    toastTimer = setTimeout(() => { els.toast.className = "toast"; }, 3000);
  }

  function updateCreditsUI() {
    const u = Auth.user;
    const remaining = u ? (u.creditsRemaining ?? 0) : 0;
    els.sidebarCredits.textContent = remaining;
    els.topbarCreditsBadge.textContent = "积分 " + remaining;
    els.topbarUser.textContent = u ? (u.name || u.email || "用户") : "—";
  }

  // ── Auth init ────────────────────────────────────────────────────────────
  async function initAuth() {
    try {
      await Auth.init("user");
      updateCreditsUI();
      if (Auth.isAdmin) { var al = document.getElementById("adminLink"); if (al) al.style.display = ""; }
      return true;
    } catch (e) {
      // Auth.init already redirects to /login.html on failure
      console.error("Auth init failed:", e.message);
      return false;
    }
  }

  // ── Load settings → populate selectors ───────────────────────────────────
  async function loadSettings() {
    try {
      const data = await Api.get("/settings");
      const single = (data.settings && data.settings.promptConfig && data.settings.promptConfig.single) || {};
      state.matrix = single.matrix || null;
      state.defaults = (state.matrix && state.matrix.defaults) || null;
      populatePlatforms();
    } catch (e) {
      showToast("加载配置失败: " + e.message, true);
    }
  }

  function populatePlatforms() {
    const sel = els.platformSelect;
    sel.innerHTML = "";
    if (!state.matrix || !Array.isArray(state.matrix.platforms)) {
      sel.innerHTML = '<option value="">无可用平台</option>';
      sel.disabled = true;
      return;
    }
    state.matrix.platforms.forEach((p) => {
      const opt = document.createElement("option");
      opt.value = p.id;
      opt.textContent = p.label;
      sel.appendChild(opt);
    });
    sel.disabled = false;
    // Set default
    if (state.defaults && state.defaults.platformId) {
      sel.value = state.defaults.platformId;
    }
    populateCategories();
  }

  function populateCategories() {
    const sel = els.categorySelect;
    sel.innerHTML = "";
    const platformId = els.platformSelect.value;
    const platform = state.matrix && state.matrix.platforms
      ? state.matrix.platforms.find((p) => p.id === platformId)
      : null;
    if (!platform || !Array.isArray(platform.categories)) {
      sel.innerHTML = '<option value="">— 无品类 —</option>';
      sel.disabled = true;
      populateScenarios();
      return;
    }
    platform.categories.forEach((c) => {
      const opt = document.createElement("option");
      opt.value = c.id;
      opt.textContent = c.label;
      sel.appendChild(opt);
    });
    sel.disabled = false;
    if (state.defaults && state.defaults.categoryId) {
      sel.value = state.defaults.categoryId;
    }
    populateScenarios();
  }

  function populateScenarios() {
    const sel = els.scenarioSelect;
    sel.innerHTML = "";
    const platformId = els.platformSelect.value;
    const categoryId = els.categorySelect.value;
    const platform = state.matrix && state.matrix.platforms
      ? state.matrix.platforms.find((p) => p.id === platformId)
      : null;
    const category = platform && Array.isArray(platform.categories)
      ? platform.categories.find((c) => c.id === categoryId)
      : null;
    if (!category || !Array.isArray(category.scenarios) || category.scenarios.length === 0) {
      sel.innerHTML = '<option value="">— 无场景 —</option>';
      sel.disabled = true;
      return;
    }
    category.scenarios.forEach((s) => {
      const opt = document.createElement("option");
      opt.value = s.templateId || s.id || "";
      opt.textContent = s.title || s.id || "";
      opt.dataset.scenarioId = s.id || "";
      sel.appendChild(opt);
    });
    sel.disabled = false;
    if (state.defaults && state.defaults.scenarioId) {
      // Try to match by scenario id
      const match = Array.from(sel.options).find((o) => o.dataset.scenarioId === state.defaults.scenarioId);
      if (match) sel.value = match.value;
    }
  }

  // ── Reference image handling ─────────────────────────────────────────────
  function addReferenceFiles(files) {
    const available = 3 - state.references.length;
    if (available <= 0) {
      showToast("最多上传 3 张参考图", true);
      return;
    }
    const toAdd = Array.from(files).slice(0, available);
    toAdd.forEach((file) => {
      if (!file.type.startsWith("image/")) return;
      const reader = new FileReader();
      reader.onload = () => {
        state.references.push({
          name: file.name,
          size: file.size,
          url: reader.result
        });
        renderRefPreviews();
      };
      reader.readAsDataURL(file);
    });
  }

  function removeReference(index) {
    state.references.splice(index, 1);
    renderRefPreviews();
  }

  function renderRefPreviews() {
    els.refPreviews.innerHTML = state.references
      .map(
        (ref, i) =>
          `<div class="ref-thumb"><img src="${attrEscape(ref.url)}" alt="${escapeHtml(ref.name)}" /><button class="ref-remove" type="button" data-index="${i}" title="移除">×</button></div>`
      )
      .join("");
    // Bind remove buttons
    els.refPreviews.querySelectorAll(".ref-remove").forEach((btn) => {
      btn.addEventListener("click", () => removeReference(parseInt(btn.dataset.index, 10)));
    });
  }

  // ── Dropzone events ──────────────────────────────────────────────────────
  function initDropzone() {
    const dz = els.dropzone;
    dz.addEventListener("dragover", (e) => { e.preventDefault(); dz.classList.add("drag-over"); });
    dz.addEventListener("dragleave", () => dz.classList.remove("drag-over"));
    dz.addEventListener("drop", (e) => {
      e.preventDefault();
      dz.classList.remove("drag-over");
      if (e.dataTransfer.files.length) addReferenceFiles(e.dataTransfer.files);
    });
    els.refInput.addEventListener("change", () => {
      if (els.refInput.files.length) addReferenceFiles(els.refInput.files);
      els.refInput.value = "";
    });
  }

  // ── Generate ─────────────────────────────────────────────────────────────
  async function handleGenerate() {
    if (state.generating) return;

    // Validate
    const templateId = els.scenarioSelect.value;
    if (!templateId) {
      showToast("请先选择平台 / 品类 / 场景", true);
      return;
    }
    const count = Math.max(1, Math.min(8, parseInt(els.countInput.value, 10) || 1));
    els.countInput.value = String(count);
    const size = els.sizeInput.value;

    // Client‑side credit guard
    const credits = Auth.user ? (Auth.user.creditsRemaining || 0) : 0;
    if (credits < count) {
      showCreditsModal(count, credits);
      return;
    }

    state.generating = true;
    els.generateBtn.disabled = true;
    els.generateBtn.textContent = "生成中…";

    // Timer display
    var startTime = Date.now();
    var timerEl = document.createElement("div");
    timerEl.className = "generate-timer";
    timerEl.innerHTML = '生图预计要2分钟左右，请耐心等待<br/><span style="font-size:var(--font-size-2xl);font-weight:var(--font-weight-bold);color:var(--color-accent)" id="genTimer">0</span><span class="text-muted"> 秒</span>';
    els.resultGrid.innerHTML = "";
    els.resultGrid.appendChild(timerEl);
    var timerInterval = setInterval(function() {
      var elapsed = Math.floor((Date.now() - startTime) / 1000);
      var el = document.getElementById("genTimer");
      if (el) el.textContent = elapsed;
    }, 1000);

    try {
      const payload = await Api.post("/generate", {
        count,
        size,
        templateId,
        referenceImages: state.references.map((r) => ({ name: r.name, size: r.size, url: r.url }))
      });

      // Update credits from response
      if (payload.creditsRemaining !== undefined && Auth.user) {
        Auth.user.creditsRemaining = payload.creditsRemaining;
        updateCreditsUI();
      }

      const images = payload.images || [];
      clearInterval(timerInterval);
      renderResults(images, templateId);
      showToast("已生成 " + images.length + " 张图片");
      clearInterval(timerInterval);
    } catch (err) {
      if (err.status === 429) {
        // Credit insufficient
        const required = (err.data && err.data.required) || count;
        const remaining = (err.data && err.data.remaining) || 0;
        showCreditsModal(required, remaining);
      } else if (err.authFailure) {
        // Already redirected
      } else {
        renderEmptyResult("生成失败", err.message);
        showToast(err.message || "生成失败", true);
      }
    } finally {
      state.generating = false;
      els.generateBtn.disabled = false;
      els.generateBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 3 14h8l-1 8 11-13h-8z"/></svg> 生成图片';
    }
  }

  function renderLoadingGrid(count) {
    els.resultGrid.innerHTML = Array.from({ length: count }, () => '<div class="loading-placeholder"></div>').join("");
  }

  function renderResults(images, templateId) {
    if (!images.length) {
      renderEmptyResult("无结果", "接口未返回图片");
      return;
    }
    els.resultGrid.innerHTML = images
      .map(
        (img, i) =>
          `<div class="result-card">
            <img src="${attrEscape(fixImageUrl(img.url))}" alt="生成图 ${i + 1}" loading="lazy" />
            <div class="result-meta">#${i + 1} ${escapeHtml(templateId)}</div>
          </div>`
      )
      .join("");
  }

  function renderEmptyResult(title, msg) {
    els.resultGrid.innerHTML =
      `<div class="empty-state"><div><strong>${escapeHtml(title)}</strong><span>${escapeHtml(msg)}</span></div></div>`;
  }

  // ── Credit / Redeem modal ────────────────────────────────────────────────
  function showCreditsModal(required, remaining) {
    const modal = els.creditsModal;
    $("creditsModalTitle").textContent = required > 0 ? "积分不足" : "兑换积分";
    $("creditsRequiredRow").style.display = required > 0 ? "" : "none";
    $("creditsRequiredText").textContent = required || 0;
    $("creditsRemainingModalText").textContent =
      remaining != null ? remaining : (Auth.user ? (Auth.user.creditsRemaining || 0) : 0);
    $("creditsRedeemInput").value = "";
    $("creditsRedeemMessage").textContent = "";
    $("creditsRedeemMessage").className = "form-message";
    modal.setAttribute("aria-hidden", "false");
    modal.classList.add("active");
    $("creditsRedeemInput").focus();
  }

  function closeCreditsModal() {
    const modal = els.creditsModal;
    modal.setAttribute("aria-hidden", "true");
    modal.classList.remove("active");
  }

  async function handleSubmitRedeem() {
    const input = $("creditsRedeemInput");
    const msgEl = $("creditsRedeemMessage");
    const btn = $("submitRedeemBtn");
    const code = input.value.trim();
    if (!code) {
      msgEl.textContent = "请输入兑换码";
      msgEl.className = "form-message error";
      return;
    }
    btn.disabled = true;
    btn.textContent = "兑换中…";
    msgEl.textContent = "";
    msgEl.className = "form-message";
    try {
      const payload = await Api.post("/redeem", { code });
      msgEl.textContent = "兑换成功，已增加 " + payload.creditsAdded + " 积分";
      msgEl.className = "form-message success";
      input.value = "";
      // Update user credits
      if (Auth.user) {
        Auth.user.creditsRemaining = payload.creditsRemaining;
        Auth.user.credits = payload.creditsTotal;
        updateCreditsUI();
      }
      // Update modal display
      $("creditsRemainingModalText").textContent = payload.creditsRemaining;
      const reqEl = $("creditsRequiredText");
      reqEl.textContent = Math.max(0, parseInt(reqEl.textContent, 10) - payload.creditsAdded);
      // If now sufficient, close after a beat
      if (parseInt(reqEl.textContent, 10) <= 0) {
        setTimeout(closeCreditsModal, 1200);
      }
    } catch (err) {
      msgEl.textContent = err.message || "兑换失败";
      msgEl.className = "form-message error";
    } finally {
      btn.disabled = false;
      btn.textContent = "兑换";
    }
  }

  // ── Event bindings ───────────────────────────────────────────────────────
  function bindEvents() {
    els.platformSelect.addEventListener("change", populateCategories);
    els.categorySelect.addEventListener("change", populateScenarios);
    els.generateBtn.addEventListener("click", handleGenerate);
    els.logoutBtn.addEventListener("click", () => Auth.logout());

    // Modal events
    $("closeCreditsModalBtn").addEventListener("click", closeCreditsModal);
    $("submitRedeemBtn").addEventListener("click", handleSubmitRedeem);
    $("openRedeemBtn").addEventListener("click", () => showCreditsModal(0));
    els.creditsModal.addEventListener("click", (e) => {
      if (e.target === els.creditsModal) closeCreditsModal();
    });
    $("creditsRedeemInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleSubmitRedeem();
    });
  }

  // ── Bootstrap ────────────────────────────────────────────────────────────
  async function main() {
    bindEvents();
    initDropzone();

    const authed = await initAuth();
    if (!authed) return; // redirecting

    await loadSettings();
    updateCreditsUI();
  }

  document.addEventListener("DOMContentLoaded", main);
  </script>
</body>
</html>
