<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>素材库 - AI Image Studio</title>
  <link rel="stylesheet" href="./shared/styles.css?v=5" />
  <style>
    .asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: var(--space-4); }
    .asset-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; }
    .asset-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
    .asset-meta { padding: var(--space-2) var(--space-3); font-size: var(--font-size-xs); }
    .asset-meta .name { font-weight: var(--font-weight-medium); display: block; margin-bottom: var(--space-1); }
    .empty { text-align: center; padding: var(--space-12); color: var(--color-text-muted); }
  </style>
</head>
<body>
<div class="shell">
  <aside class="shell-sidebar">
    <div class="sidebar-brand">AI Image Studio</div>
    <nav class="sidebar-nav">
      <a href="./index.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> 生成图片</a>
      <a href="./library.html" class="active"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h6l2 2h10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg> 素材库</a>
      <a href="./edit.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m14.7 6.3 3 3L8 19H5v-3z"/><path d="m13 8 3 3"/></svg> 二次编辑</a>
    </nav>
    <div class="sidebar-footer"><span id="sidebarCredits">—</span></div>
  </aside>

  <div class="shell-main">
    <header class="shell-topbar">
      <span class="text-sm text-muted">素材库</span>
      <div class="flex items-center gap-4">
        <a href="./admin/index.html" class="btn btn-ghost btn-sm" id="adminLink" style="display:none">B端</a>
        <span id="topbarUser" class="text-sm">—</span>
        <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">退出</button>
      </div>
    </header>
    <main class="shell-content">
      <div id="grid" class="asset-grid"></div>
      <div class="empty" id="empty">暂无素材，去<a href="./index.html">生成图片</a></div>
      <div id="toast" class="toast"></div>
    </main>
  </div>
</div>

<script src="./shared/auth.js"></script>
<script src="./shared/api.js"></script>
<script>
(function() {
  var grid = document.getElementById("grid");
  var empty = document.getElementById("empty");

  function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function escAttr(s) { return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;"); }

  async function init() {
    try { await Auth.init("user"); } catch { return; }
    var u = Auth.user || {};
    document.getElementById("topbarUser").textContent = u.email || u.name || "";
    document.getElementById("sidebarCredits").textContent = (u.creditsRemaining || 0) + " 积分";
    if (Auth.isAdmin) { var al = document.getElementById("adminLink"); if (al) al.style.display = ""; }
    await loadAssets();
  }

  async function loadAssets() {
    try {
      var data = await Api.get("/generated-assets?limit=100");
      var assets = data.assets || [];
      if (!assets.length) { empty.style.display = "block"; return; }
      empty.style.display = "none";
      grid.innerHTML = assets.map(function(a) {
        var url = a.image_url || a.url || "";
        url = fixImageUrl(url);
        var thumbUrl = fixImageThumb(a.image_url || a.url || "");
        return '<div class="asset-card">'
          + '<img src="' + escAttr(thumbUrl) + '" alt="' + escAttr(a.name||"") + '" loading="lazy" />'
          + '<div class="asset-meta"><span class="name">' + esc(a.name||"未命名") + '</span>'
          + (a.model ? '<span>' + esc(a.model) + ' · ' + esc(a.size||"") + (a.refCount?" · "+a.refCount+"张参考图":"") + '</span>' : '')
          + '<div class="flex gap-2" style="margin-top:4px">'
          + '<button class="btn btn-ghost btn-sm" data-action="download" data-url="' + escAttr(url) + '" data-name="' + escAttr(a.name||"image") + '" data-id="' + escAttr(a.id) + '">下载</button>'
          + '<a class="btn btn-ghost btn-sm" href="./edit.html?url=' + encodeURIComponent(url) + '" data-action="edit" data-id="' + escAttr(a.id) + '">编辑</a>'
          + '<button class="btn btn-ghost btn-sm" data-action="delete" data-id="' + escAttr(a.id) + '" style="color:var(--color-error)">删除</button>'
          + '</div></div></div>';
      }).join("");
    } catch(e) {
      empty.innerHTML = "加载失败: " + esc(e.message);
      empty.style.display = "block";
    }
  }

  grid.addEventListener("click", function(e) {
    var btn = e.target.closest("[data-action]");
    if (!btn) return;
    var action = btn.getAttribute("data-action");
    if (action === "download") {
      e.preventDefault();
      downloadAsset(btn.getAttribute("data-url"), btn.getAttribute("data-name"));
      trackDownload(btn.getAttribute("data-id"));
    }
    if (action === "edit") {
      trackEdit(btn.getAttribute("data-id"));
    }
    if (action === "delete") {
      e.preventDefault();
      deleteAsset(btn.getAttribute("data-id"));
    }
  });

  async function downloadAsset(url, name) {
    try {
      var resp = await fetch(url);
      if (!resp.ok) throw new Error("fail");
      var blob = await resp.blob();
      var blobUrl = URL.createObjectURL(blob);
      var a = document.createElement("a"); a.href = blobUrl; a.download = (name||"image")+".png";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(blobUrl); }, 1000);
    } catch(e) { window.open(url, "_blank"); }
  }

  async function trackDownload(id) {
    try { await fetch(appRoute("/api/generated-assets/"+id+"/download"), { method:"POST", headers:{"Authorization":"Bearer "+Auth.token} }); } catch(e){}
  }
  async function trackEdit(id) {
    try { await fetch(appRoute("/api/generated-assets/"+id+"/edit"), { method:"POST", headers:{"Authorization":"Bearer "+Auth.token} }); } catch(e){}
  }

  async function deleteAsset(id) {
    if (!confirm("确定删除此素材？")) return;
    try {
      var resp = await fetch(appRoute("/api/generated-assets/" + id), { 
        method: "DELETE",
        headers: { "Authorization": "Bearer " + Auth.token }
      });
      if (!resp.ok) throw new Error("删除失败");
      location.reload();
    } catch(e) { alert("删除失败: " + e.message); }
  }

  init();
})();
</script>
</body>
</html>
