<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>素材库 - AI Image Studio</title>
  <link rel="stylesheet" href="./shared/styles.css" />
  <style>
    .asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: var(--space-4); }
    .asset-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; }
    .asset-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
    .asset-meta { padding: var(--space-2) var(--space-3); font-size: var(--font-size-xs); }
    .asset-meta .name { font-weight: var(--font-weight-medium); display: block; margin-bottom: var(--space-1); }
    .empty { text-align: center; padding: var(--space-12); color: var(--color-text-muted); }
  </style>
</head>
<body>
<div class="shell">
  <aside class="shell-sidebar">
    <div class="sidebar-brand">AI Image Studio</div>
    <nav class="sidebar-nav">
      <a href="./index.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> 生成图片</a>
      <a href="./library.html" class="active"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h6l2 2h10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg> 素材库</a>
      <a href="./edit.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m14.7 6.3 3 3L8 19H5v-3z"/><path d="m13 8 3 3"/></svg> 二次编辑</a>
    </nav>
    <div class="sidebar-footer"><span id="sidebarCredits">—</span></div>
  </aside>

  <div class="shell-main">
    <header class="shell-topbar">
      <span class="text-sm text-muted">素材库</span>
      <div class="flex items-center gap-4">
        <a href="./admin/index.html" class="btn btn-ghost btn-sm" id="adminLink" style="display:none">B端</a>
        <span id="topbarUser" class="text-sm">—</span>
        <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">退出</button>
      </div>
    </header>

    <main class="shell-content">
      <div id="grid" class="asset-grid"></div>
      <div class="empty" id="empty">暂无素材，去<a href="./index.html">生成图片</a></div>
      <div id="toast" class="toast"></div>
    </main>
  </div>
</div>

<script src="./shared/auth.js"></script>
<script src="./shared/api.js"></script>
<script>
(async function() {
  try { await Auth.init("user"); } catch { return; }
  var u = Auth.user || {};
  document.getElementById("topbarUser").textContent = u.email || u.name || "";
  document.getElementById("sidebarCredits").textContent = (u.creditsRemaining || 0) + " 积分";
  if (Auth.isAdmin) { var al = document.getElementById("adminLink"); if (al) al.style.display = ""; }

  try {
    var data = await Api.get("/generated-assets?limit=100");
    var assets = data.assets || [];
    if (!assets.length) { document.getElementById("empty").style.display = "block"; return; }
    document.getElementById("empty").style.display = "none";
    document.getElementById("grid").innerHTML = assets.map(function(a) {
      var url = a.image_url || a.url || "";
      var name = a.name || "未命名";
      return '<div class="asset-card">'
        + '<img src="' + escAttr(url) + '" alt="' + escAttr(name) + '" loading="lazy" />'
        + '<div class="asset-meta"><span class="name">' + esc(name) + '</span>'
        + (a.model ? '<span>' + esc(a.model) + ' · ' + esc(a.size || "") + (a.refCount ? ' · ' + a.refCount + '张参考图' : '') + '</span>' : '')
        + '<div class="flex gap-2" style="margin-top:4px">'
        + '<a class="btn btn-ghost btn-sm" href="#" onclick="downloadAsset(event,\'' + escAttr(url) + '\',\'' + escAttr(name) + '\')">下载</a>'
        + '<a class="btn btn-ghost btn-sm" href="./edit.html?url=' + encodeURIComponent(url) + '">编辑</a>'
        + '<a class="btn btn-ghost btn-sm" href="#" onclick="deleteAsset(event,\'' + escAttr(a.id) + '\')" style="color:var(--color-error)">删除</a>'
        + '</div></div></div>';
    }).join("");
  } catch(e) {
    document.getElementById("empty").innerHTML = "加载失败: " + esc(e.message);
    document.getElementById("empty").style.display = "block";
  }

  async function deleteAsset(e, id) {
    e.preventDefault();
    alert("deleteAsset called, id=" + id);
    if (!confirm("确定删除此素材？")) return;
    try {
      var resp = await fetch(appRoute("/api/generated-assets/" + id), { 
        method: "DELETE",
        headers: { "Authorization": "Bearer " + Auth.token }
      });
      if (!resp.ok) throw new Error("删除失败");
      location.reload();
    } catch(err) { 
      alert("删除失败: " + err.message); 
    }
  }

  function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function escAttr(s) { return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;"); }

  async function downloadAsset(e, url, name) {
    e.preventDefault();
    try {
      var resp = await fetch(url);
      if (!resp.ok) throw new Error("下载失败");
      var blob = await resp.blob();
      var blobUrl = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = blobUrl;
      a.download = (name || "image") + ".png";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function() { URL.revokeObjectURL(blobUrl); }, 1000);
    } catch(err) {
      window.open(url, "_blank");
    }
  }
})();
</script>
</body>
</html>
